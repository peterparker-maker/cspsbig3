<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>長興國小六年級英文句型練習</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--ld:#F9A825;--text:#3D2B1F;--textm:#5D4037;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito','Microsoft JhengHei',sans-serif;background:linear-gradient(180deg,#667eea 0%,#a8c8f8 55%,#d4ecd4 100%);min-height:100vh;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;overflow-y:auto;padding:12px 0 24px;}
.cloud{position:fixed;background:#fff;border-radius:50px;opacity:.75;animation:floatC linear infinite;}
.cloud::before,.cloud::after{content:'';position:absolute;background:#fff;border-radius:50%;}
.c1{width:130px;height:42px;top:9%;left:-150px;animation-duration:32s;}.c1::before{width:65px;height:65px;top:-32px;left:14px;}.c1::after{width:44px;height:44px;top:-22px;left:54px;}
.c2{width:95px;height:30px;top:18%;left:-115px;animation-duration:24s;animation-delay:-10s;opacity:.5;}.c2::before{width:48px;height:48px;top:-24px;left:12px;}.c2::after{width:32px;height:32px;top:-16px;left:40px;}
.c3{width:110px;height:36px;top:5%;left:-130px;animation-duration:28s;animation-delay:-18s;}.c3::before{width:55px;height:55px;top:-28px;left:10px;}.c3::after{width:36px;height:36px;top:-18px;left:46px;}
@keyframes floatC{from{transform:translateX(0)}to{transform:translateX(110vw)}}
.deco{position:fixed;font-size:clamp(1rem,1.5vw,1.5rem);animation:twinkle 2.5s ease-in-out infinite;pointer-events:none;}
@keyframes twinkle{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}

/* CARD */
.card{
  background:#fff;border-radius:clamp(16px,2vw,26px);
  padding:clamp(14px,2vh,22px) clamp(16px,2.5vw,28px) clamp(14px,2vh,20px);
  width:97vw;max-width:1100px;
  min-height:90vh;
  height:auto;
  box-shadow:0 8px 36px rgba(0,0,0,.2);
  display:flex;flex-direction:column;gap:clamp(8px,1.2vh,14px);
  position:relative;z-index:10;
}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;flex-shrink:0;flex-wrap:wrap;gap:4px;padding-bottom:2px;}
.hdr-l{display:flex;align-items:center;gap:8px;}
.hicon{font-size:clamp(1.4rem,2.2vw,2rem);}
.htitle{font-size:clamp(.9rem,1.3vw,1.22rem);font-weight:900;color:var(--text);}
.hsub{display:none;}
.tabs{display:flex;gap:6px;flex-wrap:nowrap;}
.tab{padding:clamp(5px,.7vh,8px) clamp(10px,1.2vw,17px);border-radius:18px;border:2.5px solid transparent;font-family:'Nunito',sans-serif;font-size:clamp(.72rem,.95vw,.9rem);font-weight:800;cursor:pointer;transition:all .2s;background:#f0f0f0;color:#bbb;line-height:1.3;white-space:nowrap;}
.tl1{background:linear-gradient(135deg,#90CAF9,#1976D2);color:#fff;border-color:#1976D2;box-shadow:0 3px 10px rgba(25,118,210,.4);}
.tl2{background:linear-gradient(135deg,#FFCC80,#F57C00);color:#fff;border-color:#F57C00;box-shadow:0 3px 10px rgba(245,124,0,.4);}
.tlmix{background:linear-gradient(135deg,#CE93D8,#7B1FA2);color:#fff;border-color:#7B1FA2;box-shadow:0 3px 10px rgba(123,31,162,.4);}

/* PROGRESS */
.prog-wrap{flex-shrink:0;}
.prog-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap;}
.dbadge{padding:3px 12px;border-radius:11px;font-size:clamp(.62rem,.85vw,.78rem);font-weight:800;opacity:.32;transition:all .3s;}
.dbadge.active{opacity:1;transform:scale(1.08);}
.dbadge.done{opacity:.65;}
.de{background:#BBDEFB;color:#0D47A1;}.dm{background:#FFF9C4;color:#827717;}.dh{background:#FCE4EC;color:#880E4F;}
.rbadge{margin-left:auto;font-size:clamp(.62rem,.8vw,.76rem);font-weight:800;color:#bbb;}
.prog-bg{height:8px;background:#F0F0F0;border-radius:8px;overflow:hidden;}
.prog-fill{height:100%;border-radius:8px;transition:width .5s ease;}

/* QUESTION */
.qbox{border-radius:18px;padding:clamp(14px,2vh,22px) clamp(16px,2vw,28px);flex-shrink:0;border:2.5px dashed var(--ld);background:#FFFDE7;width:100%;}
.qlabel{font-size:clamp(.6rem,.76vw,.72rem);font-weight:800;color:var(--ld);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;}
.qzh{font-size:clamp(1.8rem,3.5vw,3rem);font-weight:900;color:var(--text);}
.qtip{font-size:clamp(.62rem,.76vw,.75rem);color:#ccc;margin-top:3px;}

/* SENTENCE AREA */
.sent-wrap{display:flex;align-items:center;gap:16px;flex-wrap:wrap;background:#F8F9FA;border-radius:13px;padding:clamp(22px,3vh,34px) clamp(18px,2.5vw,30px);flex-grow:1;min-height:clamp(110px,18vh,165px);}
.sent-wrap.two-lines{flex-direction:column;align-items:flex-start;gap:10px;}
.sent-line{display:flex;align-items:center;gap:8px;flex-wrap:wrap;width:100%;}
.line-label{font-size:clamp(.6rem,.72vw,.7rem);font-weight:800;color:#bbb;text-transform:uppercase;letter-spacing:.5px;min-width:30px;}
.slabel{font-size:clamp(.6rem,.76vw,.72rem);font-weight:800;color:#ccc;text-transform:uppercase;letter-spacing:1px;width:100%;margin-bottom:2px;}
.sword{font-size:clamp(1.2rem,2vw,1.8rem);font-weight:800;color:var(--text);margin:0 8px;}

/* SLOT */
.slot{min-width:clamp(180px,16vw,260px);height:auto;min-height:clamp(70px,10vh,100px);border-radius:14px;border:2.5px dashed #CCC;background:#FAFAFA;display:inline-flex;align-items:center;justify-content:center;font-size:clamp(1.4rem,2.8vw,3.2rem);font-weight:800;color:var(--text);transition:all .2s;cursor:default;padding:14px 22px;}
.slot.occupied{border:2.5px solid #1976D2;background:#DDEEFF;cursor:pointer;}
.slot.occupied:hover{background:#BBDEFB;transform:scale(1.03);}
.slot.drag-over{border-color:#0097A7;background:#00BCD4;color:#fff;transform:scale(1.1);box-shadow:0 0 0 4px rgba(0,151,167,.4);animation:flashBorder .5s ease infinite alternate;}
.slot.ok{border-color:#4CAF50!important;background:#C8F5CA!important;animation:bSlot .4s ease;}
.slot.bad{border-color:#F44336!important;background:#FFCDD2!important;animation:sSlot .4s ease;}
.slot.hinted{border-color:#AB47BC!important;background:#F3E5F5!important;cursor:default;}
@keyframes flashBorder{0%{box-shadow:0 0 0 3px rgba(0,151,167,.3);}100%{box-shadow:0 0 0 6px rgba(0,151,167,.7);}}
@keyframes bSlot{0%,100%{transform:scale(1)}50%{transform:scale(1.09)}}
@keyframes sSlot{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* CHIPS */
.chips-wrap{flex-grow:1;min-height:clamp(90px,12vh,140px);}
.clabel{font-size:clamp(.6rem,.76vw,.72rem);font-weight:800;color:#ccc;text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;}
.chips-row{display:flex;gap:9px;flex-wrap:wrap;align-items:flex-start;}
.chip{padding:clamp(14px,2vh,20px) clamp(22px,2.8vw,34px);border-radius:11px;font-size:clamp(1.6rem,2.8vw,3.2rem);font-weight:800;cursor:grab;user-select:none;transition:all .2s;touch-action:none;box-shadow:0 6px 20px rgba(0,0,0,.22), 0 2px 6px rgba(0,0,0,.1);border:2.5px solid transparent;position:relative;z-index:1;}
.chip:active{cursor:grabbing;transform:scale(1.07) rotate(2deg);z-index:500;}
.chip.dragging{opacity:.4;transform:scale(.93);}
.chip.used{opacity:.18;cursor:not-allowed;pointer-events:none;}
.cc0{background:#BBDEFB;border-color:#64B5F6;color:#0D47A1;}
.cc1{background:#C8E6C9;border-color:#81C784;color:#1B5E20;}
.cc2{background:#FFE0B2;border-color:#FFB74D;color:#6D3B00;}
.cc3{background:#F8BBD9;border-color:#F48FB1;color:#880E4F;}
.cc4{background:#E1BEE7;border-color:#CE93D8;color:#4A148C;}
.cc5{background:#B2EBF2;border-color:#80DEEA;color:#006064;}
.cc6{background:#FFF9C4;border-color:#FFF176;color:#5D4037;}
.drag-ghost{position:fixed;pointer-events:none;z-index:9999;transform:scale(1.3) rotate(5deg);opacity:.9;transition:none;}

/* BUTTONS */
.btn-row{display:flex;gap:9px;justify-content:flex-end;align-items:center;flex-shrink:0;}
.btn{padding:clamp(8px,1vh,12px) clamp(16px,2vw,24px);border-radius:12px;border:none;font-family:'Nunito',sans-serif;font-size:clamp(.82rem,1.05vw,.98rem);font-weight:800;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px;}
.btn:hover{transform:translateY(-2px);}.btn:active{transform:scale(.97);}
.bclear{background:linear-gradient(135deg,#FFCDD2,#EF9A9A);color:#C62828;box-shadow:0 4px 12px rgba(239,154,154,.35);}
.bhint{background:linear-gradient(135deg,#FFF9C4,#FFD54F);color:#5D3A00;box-shadow:0 4px 12px rgba(255,213,79,.4);}
.bhint:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.bconf{background:linear-gradient(135deg,#90CAF9,#1976D2);color:#fff;font-size:clamp(.85rem,1.05vw,1rem);padding:clamp(9px,1.1vh,13px) clamp(18px,2.2vw,28px);box-shadow:0 4px 12px rgba(25,118,210,.4);}
.bconf.l2{background:linear-gradient(135deg,#FFCC80,#F57C00);box-shadow:0 4px 12px rgba(245,124,0,.4);}
.bconf.lmix{background:linear-gradient(135deg,#CE93D8,#7B1FA2);box-shadow:0 4px 12px rgba(123,31,162,.4);}
.hint-count{background:#F44336;color:#fff;border-radius:50%;width:18px;height:18px;font-size:.62rem;display:inline-flex;align-items:center;justify-content:center;margin-left:2px;}

/* FEEDBACK */
.feedback{position:absolute;inset:0;border-radius:26px;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .3s;}
.feedback.show{opacity:1;pointer-events:all;}
.fb-ok{background:rgba(200,245,202,.96);}.fb-bad{background:rgba(255,205,210,.96);}
.fb-emoji{font-size:clamp(3rem,6vw,4.5rem);animation:popIn .4s ease;}
.fb-msg{font-size:clamp(1.3rem,2.4vw,2rem);font-weight:900;margin-top:8px;color:var(--text);animation:popIn .4s ease .08s both;}
.fb-sent{font-size:clamp(1.5rem,5vw,3.5rem);font-weight:900;color:#3D2B1F;margin-top:12px;max-width:95%;text-align:center;animation:popIn .4s ease .16s both;background:#fff;padding:20px 32px;border-radius:14px;box-shadow:0 4px 16px rgba(0,0,0,.18);line-height:1.4;border:3px solid rgba(0,0,0,.08);}
@keyframes popIn{from{transform:scale(.35);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes breathe{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
.btn-next{margin-top:24px;padding:clamp(14px,1.8vh,20px) clamp(36px,5vw,56px);border-radius:16px;border:none;background:linear-gradient(135deg,#80DEEA,#26C6DA);color:#fff;font-family:'Nunito',sans-serif;font-size:clamp(1.2rem,2.5vw,1.6rem);font-weight:900;cursor:pointer;box-shadow:0 6px 18px rgba(38,198,218,.5);transition:all .2s;animation:breathe 2s ease-in-out infinite;}
.btn-next:hover{transform:scale(1.08);animation:none;}

/* SPEAK CONTAINER & BUTTON */
.speak-container{display:flex;flex-direction:column;align-items:center;margin-top:20px;animation:popIn .4s ease .2s both;}
.btn-speak{padding:15px 30px;border-radius:18px;border:none;background:linear-gradient(135deg,#FF7043,#FF5252);color:#fff;font-family:'Nunito',sans-serif;font-size:clamp(1rem,1.8vw,1.25rem);font-weight:700;cursor:pointer;box-shadow:0 6px 20px rgba(255,82,82,.5);transition:all .2s;display:flex;align-items:center;gap:10px;}
.btn-speak:hover{transform:translateY(-3px) scale(1.05);box-shadow:0 8px 25px rgba(255,82,82,.7);}
.btn-speak:active{transform:translateY(-1px) scale(1.02);}
.speak-hint{font-size:clamp(0.8rem,1.5vw,0.95rem);color:#FF5252;margin-top:8px;font-weight:600;}

/* ROUND COMPLETE */
.rcscreen{position:absolute;inset:0;border-radius:26px;background:rgba(240,248,255,.97);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:200;animation:popIn .5s ease;}
.rcscreen.show{display:flex;}
.rc-emoji{font-size:clamp(3.5rem,6vw,5rem);}
.rc-title{font-size:clamp(1.4rem,2.4vw,2.2rem);font-weight:900;color:var(--text);margin:10px 0 4px;}
.rc-sub{font-size:clamp(.82rem,1.05vw,1.05rem);color:#aaa;}
.rc-stars{display:flex;gap:10px;margin:12px 0;}
.rc-star{font-size:clamp(1.8rem,2.8vw,2.4rem);animation:starPop .4s ease both;}
.rc-star:nth-child(2){animation-delay:.15s;}.rc-star:nth-child(3){animation-delay:.3s;}
@keyframes starPop{from{transform:scale(0) rotate(-30deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
.btn-cont{margin-top:12px;padding:clamp(11px,1.3vh,16px) clamp(26px,3.2vw,40px);border-radius:16px;border:none;background:linear-gradient(135deg,#90CAF9,#1976D2);color:#fff;font-family:'Nunito',sans-serif;font-size:clamp(.92rem,1.15vw,1.1rem);font-weight:900;cursor:pointer;box-shadow:0 6px 18px rgba(25,118,210,.45);transition:all .2s;}
.btn-cont:hover{transform:translateY(-3px) scale(1.03);}
.btn-cont.l2{background:linear-gradient(135deg,#FFCC80,#F57C00);box-shadow:0 6px 18px rgba(245,124,0,.45);}
.btn-cont.lmix{background:linear-gradient(135deg,#CE93D8,#7B1FA2);box-shadow:0 6px 18px rgba(123,31,162,.45);}

/* ════════════════════════════════════════════════════════════════ */
/* BRICK REVEAL SYSTEM */
/* ════════════════════════════════════════════════════════════════ */
.chip-brick {
  background-color: #e67e22 !important;
  background-image:
    repeating-linear-gradient(0deg, transparent 0, transparent 41px, #ffffff 41px, #ffffff 45px),
    repeating-linear-gradient(90deg, #ffffff 0, #ffffff 3px, transparent 3px, transparent 87px),
    linear-gradient(90deg, transparent 0, transparent 177px, #ffffff 177px, #ffffff 180px) !important;
  background-size: 180px 45px, 180px 90px, 180px 90px;
  box-shadow: 0 2px 6px rgba(0,0,0,.2), inset 0 0 0 2px #000 !important;
  border: none !important; color: transparent !important; text-shadow: none !important;
  cursor: pointer !important; position: relative; overflow: visible; user-select: none;
  width: 180px; height: 90px;
  display: flex; align-items: center; justify-content: center;
  box-sizing: border-box;
}

/* ════════════════════════════════════════════════════════════════ */
/* CONFETTI */
/* ════════════════════════════════════════════════════════════════ */
.confetti-p {
  position:fixed; width:10px; height:10px; border-radius:2px;
  pointer-events:none; z-index:9999;
  animation:confettiFall linear forwards;
}
@keyframes confettiFall {
  0%   { transform:translateY(-20px) rotate(0deg); opacity:1; }
  80%  { opacity:1; }
  100% { transform:translateY(110vh) rotate(720deg); opacity:0; }
}

/* ── RESPONSIVE BREAKPOINTS ── */
@media(max-width:600px){
  body{padding:8px 0 20px;}
  .card{min-height:auto;border-radius:14px;width:99vw;padding:12px 12px 14px;}
  .hdr{flex-direction:column;align-items:flex-start;}
  .tabs{width:100%;flex-wrap:wrap;}
  .tab{flex:1;text-align:center;}
  .qzh{font-size:clamp(1.2rem,5vw,1.8rem);}
  .chip{font-size:clamp(1rem,4.5vw,1.5rem);padding:8px 12px;}
  .slot{font-size:clamp(.9rem,3.5vw,1.1rem);min-width:clamp(65px,22vw,100px);}
  .sent-wrap .sword{font-size:clamp(1.4rem,3.5vw,1.6rem);font-weight:900;}
  .sword{font-size:clamp(.9rem,3.5vw,1.1rem);}
  .fb-sent{font-size:clamp(1rem,5vw,1.8rem);padding:14px 20px;}
  .btn-next{font-size:clamp(1rem,4vw,1.3rem);padding:12px 30px;}
}
@media(min-width:600px) and (max-width:900px){
  .card{min-height:auto;}
  .qzh{font-size:clamp(1.3rem,2.5vw,2rem);}
  .chip{font-size:clamp(1.1rem,2.2vw,1.6rem);}
  .slot{font-size:clamp(.95rem,1.8vw,1.2rem);}
}
@media(min-width:1024px){
  body{padding:16px 0 28px;}
  .card{padding:26px 36px;gap:18px;max-width:1300px;}
  .qbox{border-radius:20px;padding:20px 32px;}
  .hsub{display:none;}
  .tabs{flex-wrap:nowrap;gap:8px;}
  .tab{padding:7px 18px;font-size:.92rem;}
  .qzh{font-size:clamp(2.2rem,3.5vw,3.2rem);}
  .sent-wrap .sword{font-size:clamp(2.6rem,4.2vw,3rem);font-weight:900;margin:0 12px;}
  .sent-wrap{min-height:clamp(130px,18vh,185px);padding:28px 34px;gap:18px;}
  .chip{font-size:clamp(1.8rem,3vw,3.6rem);padding:18px 36px;box-shadow:0 8px 24px rgba(0,0,0,.25), 0 2px 8px rgba(0,0,0,.12);}
  .chips-wrap{min-height:clamp(120px,15vh,180px);}
  .chips-row{gap:18px;}
  .slot{font-size:clamp(1.6rem,3vw,3.6rem);min-width:clamp(200px,18vw,290px);min-height:clamp(80px,10vh,116px);padding:16px 26px;border-radius:16px;}
  .dbadge{font-size:.78rem;padding:4px 14px;}
  .fb-sent{font-size:clamp(1.6rem,4.5vw,3rem);padding:24px 40px;}
  .btn-next{font-size:clamp(1.3rem,2.3vw,1.8rem);padding:18px 56px;}
}
</style>
</head>
<body>
<div class="cloud c1"></div><div class="cloud c2"></div><div class="cloud c3"></div>
<div class="deco" style="top:9%;left:5%;animation-delay:0s">🕐</div>
<div class="deco" style="top:18%;right:5%;animation-delay:.7s">📍</div>
<div class="deco" style="bottom:14%;left:4%;animation-delay:1.3s">⭐</div>
<div class="deco" style="bottom:18%;right:4%;animation-delay:.4s">✨</div>

<div class="card" id="mainCard">
  <!-- Header -->
  <div class="hdr">
    <div class="hdr-l">
      <div class="hicon">📝</div>
      <div><div class="htitle">Sentence Practice 句型重組練習</div><div class="hsub">長興國小六年級英語・過去式 Was / Were</div></div>
    </div>
    <div class="tabs">
      <button class="tab tl1" id="tab1" onclick="switchLesson(1)">🧑 Lesson 1<br><small style="font-size:.58rem;font-weight:600">I / You + were/was</small></button>
      <button class="tab" id="tab2" onclick="switchLesson(2)">👫 Lesson 2<br><small style="font-size:.58rem;font-weight:600">He / She + was</small></button>
      <button class="tab" id="tabMix" onclick="switchLesson('mix')">🔀 Mix<br><small style="font-size:.58rem;font-weight:600">綜合練習</small></button>
    </div>
  </div>

  <!-- Progress -->
  <div class="prog-wrap">
    <div class="prog-row">
      <span class="dbadge de active" id="bd-e">⭐ Easy</span>
      <span class="dbadge dm" id="bd-m">⭐⭐ Medium</span>
      <span class="dbadge dh" id="bd-h">⭐⭐⭐ Challenge</span>
      <span class="rbadge" id="rbadge">Round 1</span>
    </div>
    <div class="prog-bg"><div class="prog-fill" id="progFill" style="width:0%;background:linear-gradient(90deg,#90CAF9,#1976D2)"></div></div>
  </div>

  <!-- Question -->
  <div class="qbox">
    <div class="qlabel">📖 中文提示</div>
    <div class="qzh" id="qZh">—</div>
    <div class="qtip" id="qTip"></div>
  </div>

  <!-- Sentence display -->
  <div class="sent-wrap" id="sentWrap"><div class="slabel">✏️ 排列答案</div></div>

  <!-- Chips -->
  <div class="chips-wrap" id="chipsWrap">
    <div class="clabel">🎯 Word Chips 單字模塊</div>
    <div class="chips-row" id="chipsRow"></div>
  </div>

  <!-- Buttons -->
  <div class="btn-row">
    <button class="btn bhint" id="btnHint" onclick="useHint()" style="display:none">
      💡 Hint 提示 <span class="hint-count" id="hintCount">3</span>
    </button>
    <button class="btn bclear" onclick="clearAll()">🔄 Clear 清除</button>
    <button class="btn bconf" id="btnConf" onclick="checkAnswer()">✅ Confirm 確認</button>
  </div>

  <!-- Feedback -->
  <div class="feedback" id="fbOverlay">
    <div class="fb-emoji" id="fbEmoji"></div>
    <div class="fb-msg" id="fbMsg"></div>
    <div class="fb-sent" id="fbSent"></div>
    <div class="speak-container" id="speakContainer" style="display:none;">
      <button class="btn-speak" id="btnSpeak" onclick="speakSentence()">🔊 Click to Listen & Repeat</button>

// =====================================================================
// STATE
// =====================================================================
let les=1, diffIdx=0, roundNum=1;
const DIFFS=['easy','medium','hard'];
let usedIdx={1:{easy:[],medium:[],hard:[]},2:{easy:[],medium:[],hard:[]},'mix':{easy:[],medium:[],hard:[]}};
let curQ=null, slotVals=[], slotEls=[];
let dragIdx=-1, dragGhost=null, touchSlot=null;
let hintsLeft=3;

function cDiff(){ return DIFFS[diffIdx]; }

function pickQ(l,d){
  const pool=(l==='mix')?QB_MIX[d]:QB[l][d];
  const used=usedIdx[l][d];
  let av=pool.map((_,i)=>i).filter(i=>!used.includes(i));
  if(!av.length){ usedIdx[l][d]=[]; av=pool.map((_,i)=>i); }
  const i=av[~~(Math.random()*av.length)];
  usedIdx[l][d].push(i);
  return pool[i];
}

function switchLesson(n){
  les=n; diffIdx=0; roundNum=1;
  document.getElementById('tab1').className='tab'+(n===1?' tl1':'');
  document.getElementById('tab2').className='tab'+(n===2?' tl2':'');
  document.getElementById('tabMix').className='tab'+(n==='mix'?' tlmix':'');
  const sfx=n===2?' l2':n==='mix'?' lmix':'';
  document.getElementById('btnConf').className='btn bconf'+sfx;
  document.getElementById('btnCont').className='btn-cont'+sfx;
  document.getElementById('rcScreen').className='rcscreen';
  document.getElementById('progFill').style.background=
    n===1?'linear-gradient(90deg,#90CAF9,#1976D2)':
    n===2?'linear-gradient(90deg,#FFCC80,#F57C00)':
          'linear-gradient(90deg,#CE93D8,#7B1FA2)';
  loadQ();
}

function loadQ(){
  const d=cDiff();
  curQ=pickQ(les,d); slotVals=[]; slotEls=[]; dragIdx=-1; hintsLeft=3;

  ['e','m','h'].forEach((k,i)=>{
    const el=document.getElementById('bd-'+k);
    el.className='dbadge d'+k;
    if(i<diffIdx) el.classList.add('done');
    if(i===diffIdx) el.classList.add('active');
  });
  document.getElementById('progFill').style.width=(diffIdx/3*100)+'%';
  document.getElementById('rbadge').textContent='Round '+roundNum;
  document.getElementById('qZh').textContent=curQ.zh;
  document.getElementById('qTip').textContent=
    d==='easy' ?'🖐 拖曳正確的單字填入空格':
    d==='medium'?'🖐 拖曳模塊填入空格（注意誘答選項！）':
                 '🖐 把所有模塊排成完整句子（可用提示）';

  const btnHint=document.getElementById('btnHint');
  if(d==='hard'){
    btnHint.style.display='flex'; btnHint.disabled=false;
    document.getElementById('hintCount').textContent=hintsLeft;
  } else {
    btnHint.style.display='none';
  }

  if(d==='hard') buildStemTwoLines(); else buildStemSingle(curQ.stem);
  buildChips(curQ.chips);
  document.getElementById('fbOverlay').className='feedback';
  document.getElementById('btnNext').style.display='';
}

function buildStemSingle(stemArr){
  const wrap=document.getElementById('sentWrap');
  wrap.className='sent-wrap';
  wrap.innerHTML='<div class="slabel">✏️ 排列答案</div>';
  let si=0;
  stemArr.forEach(p=>{
    if(p.t==='w'){
      const sp=document.createElement('span'); sp.className='sword'; sp.textContent=p.v; wrap.appendChild(sp);
    } else { const slot=makeSlot(si); wrap.appendChild(slot); si++; }
  });
}

function buildStemTwoLines(){
  const wrap=document.getElementById('sentWrap');
  wrap.className='sent-wrap two-lines';
  wrap.innerHTML='<div class="slabel">✏️ 排列答案（問句 + 答句）</div>';
  let si=0;
  const qRow=document.createElement('div'); qRow.className='sent-line';
  const qL=document.createElement('span'); qL.className='line-label'; qL.textContent='Q:'; qRow.appendChild(qL);
  curQ.qLine.forEach(p=>{
    if(p.t==='w'){ const sp=document.createElement('span'); sp.className='sword'; sp.textContent=p.v; qRow.appendChild(sp); }
    else { qRow.appendChild(makeSlot(si)); si++; }
  });
  wrap.appendChild(qRow);
  const aRow=document.createElement('div'); aRow.className='sent-line';
  const aL=document.createElement('span'); aL.className='line-label'; aL.textContent='A:'; aRow.appendChild(aL);
  curQ.aLine.forEach(p=>{
    if(p.t==='w'){ const sp=document.createElement('span'); sp.className='sword'; sp.textContent=p.v; aRow.appendChild(sp); }
    else { aRow.appendChild(makeSlot(si)); si++; }
  });
  wrap.appendChild(aRow);
}

function makeSlot(si){
  const slot=document.createElement('div');
  slot.className='slot'; slot.dataset.si=si;
  slotVals.push(null); slotEls.push(slot);
  const mi=si;
  slot.addEventListener('dragover',e=>{e.preventDefault();slot.classList.add('drag-over');});
  slot.addEventListener('dragleave',()=>slot.classList.remove('drag-over'));
  slot.addEventListener('drop',e=>{e.preventDefault();slot.classList.remove('drag-over');dropOn(mi);});
  slot.addEventListener('click',()=>{ if(slot.classList.contains('occupied')&&!slot.classList.contains('hinted')) returnChip(mi); });
  return slot;
}

function buildChips(arr){
  const wrap=document.getElementById('chipsWrap'); wrap.style.display='';
  const row=document.getElementById('chipsRow'); row.innerHTML='';
  const shuffled=[...arr].sort(()=>Math.random()-.5);
  shuffled.forEach((c,i)=>{
    const chip=document.createElement('div');
    chip.className='chip cc'+(i%7)+' chip-brick';
    chip.dataset.ci=i; chip.dataset.word=c.v;
    chip.draggable=false;
    chip.textContent='';
    chip.addEventListener('click',()=>hitBrick(chip,c.v,i));
    chip.addEventListener('dragstart',e=>{dragIdx=i;chip.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    chip.addEventListener('dragend',()=>chip.classList.remove('dragging'));
    chip.addEventListener('touchstart',e=>tStart(e,i),{passive:false});
    chip.addEventListener('touchmove',e=>tMove(e),{passive:false});
    chip.addEventListener('touchend',e=>tEnd(e,i));
    row.appendChild(chip);
  });
}

// =====================================================================
// BRICK HITTING
// =====================================================================
function hitBrick(chip,word,ci){
  if(!chip.classList.contains('chip-brick')) return;
  initAudio();
  playKnockSound();
  chip.classList.remove('chip-brick');
  chip.textContent=word;
  chip.draggable=true;
}

function dropOn(si){
  if(dragIdx<0) return;
  const chips=document.querySelectorAll('#chipsRow .chip'), chip=chips[dragIdx];
  if(!chip||chip.classList.contains('used')) return;
  if(slotVals[si]!==null) returnChip(si);
  const w=chip.dataset.word;
  slotVals[si]=w; chip.classList.add('used');
  slotEls[si].textContent=w; slotEls[si].className='slot occupied'; dragIdx=-1;
}
function returnChip(si){
  const w=slotVals[si]; if(!w) return;
  slotVals[si]=null; slotEls[si].textContent=''; slotEls[si].className='slot';
  const chips=document.querySelectorAll('#chipsRow .chip');
  for(const c of chips){ if(c.dataset.word===w&&c.classList.contains('used')){ c.classList.remove('used'); break; } }
}

function tStart(e,ci){
  e.preventDefault(); dragIdx=ci;
  const ch=e.currentTarget,t=e.touches[0];
  dragGhost=ch.cloneNode(true); dragGhost.className=ch.className+' drag-ghost';
  dragGhost.style.width=ch.offsetWidth+'px';
  dragGhost.style.left=(t.clientX-ch.offsetWidth/2)+'px';
  dragGhost.style.top=(t.clientY-ch.offsetHeight/2)+'px';
  document.body.appendChild(dragGhost);
}
function tMove(e){
  e.preventDefault(); if(!dragGhost) return;
  const t=e.touches[0];
  dragGhost.style.left=(t.clientX-dragGhost.offsetWidth/2)+'px';
  dragGhost.style.top=(t.clientY-dragGhost.offsetHeight/2)+'px';
  const el=document.elementFromPoint(t.clientX,t.clientY);
  document.querySelectorAll('.slot').forEach(s=>s.classList.remove('drag-over'));
  if(el&&el.classList.contains('slot')){ el.classList.add('drag-over'); touchSlot=parseInt(el.dataset.si); }
  else touchSlot=null;
}
function tEnd(e,ci){
  if(dragGhost){dragGhost.remove();dragGhost=null;}
  document.querySelectorAll('.slot').forEach(s=>s.classList.remove('drag-over'));
  if(touchSlot!==null){ dropOn(touchSlot); touchSlot=null; }
  dragIdx=-1;
}

function useHint(){
  if(hintsLeft<=0) return;
  const answers=[...curQ.qLine,...curQ.aLine].filter(p=>p.t==='s').map(p=>p.v);
  for(let i=0;i<slotVals.length;i++){
    if(slotVals[i]!==null) continue;
    const ans=answers[i];
    slotVals[i]=ans; slotEls[i].textContent=ans; slotEls[i].className='slot occupied hinted';
    slotEls[i].style.borderColor='#AB47BC'; slotEls[i].style.background='#F3E5F5';
    const chips=document.querySelectorAll('#chipsRow .chip');
    for(const c of chips){ if(c.dataset.word===ans&&!c.classList.contains('used')){ c.classList.add('used'); break; } }
    hintsLeft--;
    document.getElementById('hintCount').textContent=hintsLeft;
    if(hintsLeft===0) document.getElementById('btnHint').disabled=true;
    break;
  }
}

function clearAll(){
  for(let i=0;i<slotVals.length;i++){
    if(slotEls[i]&&slotEls[i].classList.contains('hinted')) continue;
    if(slotVals[i]) returnChip(i);
  }
}

function checkAnswer(){
  const d=cDiff();
  const answers=d==='hard'
    ?[...curQ.qLine,...curQ.aLine].filter(p=>p.t==='s').map(p=>p.v)
    :curQ.stem.filter(p=>p.t==='s').map(p=>p.v);
  let ok=true;
  for(let i=0;i<answers.length;i++) if(slotVals[i]!==answers[i]){ok=false;break;}
  slotEls.forEach(s=>{ if(s.classList.contains('hinted')) return; s.classList.remove('occupied'); s.classList.add(ok?'ok':'bad'); });
  const ov=document.getElementById('fbOverlay');
  ov.className='feedback show '+(ok?'fb-ok':'fb-bad');
  document.getElementById('fbEmoji').textContent=ok?['🎉','🌟','🥳','✨','🎊'][~~(Math.random()*5)]:['😅','🤔','💪','🙈'][~~(Math.random()*4)];
  const okM=['Excellent! 太厲害了！','Great Job! 好棒喔！','Perfect! 完美！','Amazing! 真棒！'];
  const bdM=['Almost! 再試一次！','Keep Going! 重新排排看！','Try Again! 你可以的！'];
  document.getElementById('fbMsg').textContent=ok?okM[~~(Math.random()*okM.length)]:bdM[~~(Math.random()*bdM.length)];
  let fullAns=d==='hard'
    ?curQ.qLine.map(p=>p.v).join(' ')+'  /  '+curQ.aLine.map(p=>p.v).join(' ')
    :curQ.stem.map(p=>p.v).join(' ');
  document.getElementById('fbSent').textContent=fullAns;

  if(ok){
    playCorrectSound();
    document.getElementById('btnNext').style.display='';
    document.getElementById('speakContainer').style.display='flex';
  } else {
    playWrongSound();
    document.getElementById('btnNext').style.display='none';
    document.getElementById('speakContainer').style.display='none';
    setTimeout(()=>{
      ov.className='feedback';
      retryQ();
    }, 2000);
  }
}

// =====================================================================
// SPEAK SENTENCE — 手動朗讀句子
// =====================================================================
function speakSentence(){
  // 取得正確句子 (fbSent 的文本)
  const sentenceText=document.getElementById('fbSent').textContent;

  // 替換斜線為空格，避免系統唸出「slash」
  let textToSpeak=sentenceText.replace(/\s*\/\s*/g,' , ');

  // 先取消之前的朗讀，避免聲音重疊
  speechSynthesis.cancel();

  // 建立朗讀物件
  const utterance=new SpeechSynthesisUtterance(textToSpeak);
  utterance.lang='en-US';
  utterance.rate=0.6;  // 清晰慢速
  utterance.pitch=1;
  utterance.volume=1;

  // 開始朗讀
  speechSynthesis.speak(utterance);
}

function retryQ(){
  slotEls.forEach((s,i)=>{
    if(s.classList.contains('hinted')) return;
    s.classList.remove('ok','bad');
    if(slotVals[i]!==null) returnChip(i);
    s.className='slot';
  });
}

function nextQ(){
  document.getElementById('fbOverlay').className='feedback';
  diffIdx++;
  if(diffIdx>=3) showRC(); else loadQ();
}
function showRC(){
  playVictorySound();
  document.getElementById('rcTitle').textContent='Round '+roundNum+' Complete! 🎊';
  document.getElementById('rcScreen').className='rcscreen show';
}
function nextRound(){
  roundNum++; diffIdx=0;
  document.getElementById('rcScreen').className='rcscreen';
  loadQ();
}

// =====================================================================
// SOUND EFFECTS (Web Audio API)
// 單例全域 audioCtx，避免重複建立耗盡資源
// =====================================================================
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function initAudio(){
  if(audioCtx.state === 'suspended') audioCtx.resume();
}

// 答對音效：短促上揚 Do-Mi-Sol
function playCorrectSound(){
  try{
    initAudio();
    [[523.25,0],[659.25,0.12],[783.99,0.24]].forEach(([freq,delay])=>{
      const osc=audioCtx.createOscillator(), gain=audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type='sine'; osc.frequency.value=freq;
      const t=audioCtx.currentTime+delay;
      gain.gain.setValueAtTime(0,t);
      gain.gain.linearRampToValueAtTime(0.35,t+0.04);
      gain.gain.exponentialRampToValueAtTime(0.001,t+0.28);
      osc.start(t); osc.stop(t+0.3);
    });
  } catch(e){}
}

// 答錯音效：低沉鋸齒波震動
function playWrongSound(){
  try{
    initAudio();
    const osc=audioCtx.createOscillator(), gain=audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.type='sawtooth';
    osc.frequency.setValueAtTime(160,audioCtx.currentTime);
    osc.frequency.linearRampToValueAtTime(100,audioCtx.currentTime+0.3);
    gain.gain.setValueAtTime(0.28,audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.35);
    osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime+0.38);
  } catch(e){}
}

// 過關音效：五聲音階連續上升 Do-Re-Mi-Sol-La-Do，約1.5秒
function playVictorySound(){
  try{
    initAudio();
    // C4 D4 E4 G4 A4 C5
    [[261.63,0],[293.66,0.22],[329.63,0.44],[392.00,0.66],[440.00,0.88],[523.25,1.10]].forEach(([freq,delay])=>{
      const osc=audioCtx.createOscillator(), gain=audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type='sine'; osc.frequency.value=freq;
      const t=audioCtx.currentTime+delay;
      gain.gain.setValueAtTime(0,t);
      gain.gain.linearRampToValueAtTime(0.42,t+0.05);
      gain.gain.exponentialRampToValueAtTime(0.001,t+0.38);
      osc.start(t); osc.stop(t+0.4);
    });
  } catch(e){}
}

// 敲磚聲：低沉木頭悶擊
function playKnockSound(){
  try{ initAudio();
    const osc=audioCtx.createOscillator(), gain=audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.type='sine'; osc.frequency.setValueAtTime(140,audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(80,audioCtx.currentTime+0.18);
    gain.gain.setValueAtTime(0.45,audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.2);
    osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime+0.22);
  }catch(e){}
}

// 碎裂聲：雜訊脈衝 + 下墜音調
function playCrackSound(){
  try{ initAudio(); const t=audioCtx.currentTime;
    const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.15,audioCtx.sampleRate);
    const data=buf.getChannelData(0); for(let i=0;i<data.length;i++) data[i]=(Math.random()*2-1);
    const src=audioCtx.createBufferSource(), gain=audioCtx.createGain();
    src.buffer=buf; src.connect(gain); gain.connect(audioCtx.destination);
    gain.gain.setValueAtTime(0.6,t); gain.gain.exponentialRampToValueAtTime(0.001,t+0.15);
    src.start(t); src.stop(t+0.15);
    const osc=audioCtx.createOscillator(), g2=audioCtx.createGain();
    osc.connect(g2); g2.connect(audioCtx.destination);
    osc.type='sawtooth'; osc.frequency.setValueAtTime(380,t);
    osc.frequency.exponentialRampToValueAtTime(60,t+0.2);
    g2.gain.setValueAtTime(0.3,t); g2.gain.exponentialRampToValueAtTime(0.001,t+0.22);
    osc.start(t); osc.stop(t+0.22);
  }catch(e){}
}

// 地基入位：低頻厚實砰聲
function playThumpSound(){
  try{ initAudio(); const t=audioCtx.currentTime;
    const osc=audioCtx.createOscillator(), gain=audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.type='sine'; osc.frequency.setValueAtTime(75,t);
    osc.frequency.exponentialRampToValueAtTime(40,t+0.25);
    gain.gain.setValueAtTime(0.7,t); gain.gain.exponentialRampToValueAtTime(0.001,t+0.28);
    osc.start(t); osc.stop(t+0.3);
  }catch(e){}
}

// 平板解鎖：第一次觸碰即解鎖 AudioContext
document.addEventListener('click', initAudio, { once: true });
document.addEventListener('touchstart', initAudio, { once: true });

loadQ();
