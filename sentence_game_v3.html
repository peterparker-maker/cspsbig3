<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>長興國小五年級英文句型練習</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--ld:#F9A825;--text:#3D2B1F;--textm:#5D4037;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito','Microsoft JhengHei',sans-serif;background:linear-gradient(180deg,#87CEEB 0%,#B3E5FF 55%,#C8F5C8 100%);min-height:100vh;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;overflow-y:auto;padding:12px 0 24px;}
.cloud{position:fixed;background:#fff;border-radius:50px;opacity:.82;animation:floatC linear infinite;}
.cloud::before,.cloud::after{content:'';position:absolute;background:#fff;border-radius:50%;}
.c1{width:130px;height:42px;top:9%;left:-150px;animation-duration:32s;}.c1::before{width:65px;height:65px;top:-32px;left:14px;}.c1::after{width:44px;height:44px;top:-22px;left:54px;}
.c2{width:95px;height:30px;top:18%;left:-115px;animation-duration:24s;animation-delay:-10s;opacity:.55;}.c2::before{width:48px;height:48px;top:-24px;left:12px;}.c2::after{width:32px;height:32px;top:-16px;left:40px;}
.c3{width:110px;height:36px;top:5%;left:-130px;animation-duration:28s;animation-delay:-18s;}.c3::before{width:55px;height:55px;top:-28px;left:10px;}.c3::after{width:36px;height:36px;top:-18px;left:46px;}
@keyframes floatC{from{transform:translateX(0)}to{transform:translateX(110vw)}}
.deco{position:fixed;font-size:clamp(1rem,1.5vw,1.5rem);animation:twinkle 2.5s ease-in-out infinite;pointer-events:none;}
@keyframes twinkle{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}

/* CARD */
.card{
  background:#fff;border-radius:clamp(16px,2vw,26px);
  padding:clamp(14px,2vh,22px) clamp(16px,2.5vw,28px) clamp(14px,2vh,20px);
  width:97vw;max-width:1100px;
  min-height:90vh;
  height:auto;
  box-shadow:0 8px 32px rgba(0,0,0,.18);
  display:flex;flex-direction:column;gap:clamp(8px,1.2vh,14px);
  position:relative;z-index:10;
}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;flex-shrink:0;flex-wrap:wrap;gap:4px;padding-bottom:2px;}
.hdr-l{display:flex;align-items:center;gap:8px;}
.hicon{font-size:clamp(1.4rem,2.2vw,2rem);}
.htitle{font-size:clamp(.85rem,1.2vw,1.1rem);font-weight:900;color:var(--text);}
.hsub{font-size:clamp(.58rem,.75vw,.72rem);color:#aaa;font-weight:600;}
.tabs{display:flex;gap:5px;flex-wrap:nowrap;}
.tab{padding:clamp(4px,.6vh,7px) clamp(8px,1vw,14px);border-radius:18px;border:2.5px solid transparent;font-family:'Nunito',sans-serif;font-size:clamp(.68rem,.88vw,.85rem);font-weight:800;cursor:pointer;transition:all .2s;background:#f0f0f0;color:#bbb;line-height:1.3;white-space:nowrap;}
.tl1{background:linear-gradient(135deg,#A8E6CF,#5CBC8E);color:#fff;border-color:#5CBC8E;box-shadow:0 3px 10px rgba(92,188,142,.4);}
.tl2{background:linear-gradient(135deg,#FFD6E0,#FF8FAB);color:#fff;border-color:#FF8FAB;box-shadow:0 3px 10px rgba(255,143,171,.4);}
.tlmix{background:linear-gradient(135deg,#C5CAE9,#7986CB);color:#fff;border-color:#7986CB;box-shadow:0 3px 10px rgba(121,134,203,.4);}

/* PROGRESS */
.prog-wrap{flex-shrink:0;}
.prog-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap;}
.dbadge{padding:3px 12px;border-radius:11px;font-size:clamp(.62rem,.85vw,.78rem);font-weight:800;opacity:.32;transition:all .3s;}
.dbadge.active{opacity:1;transform:scale(1.08);}
.dbadge.done{opacity:.65;}
.de{background:#A8E6CF;color:#1B5E40;}.dm{background:#FFF9C4;color:#827717;}.dh{background:#FCE4EC;color:#880E4F;}
.rbadge{margin-left:auto;font-size:clamp(.62rem,.8vw,.76rem);font-weight:800;color:#bbb;}
.prog-bg{height:8px;background:#F0F0F0;border-radius:8px;overflow:hidden;}
.prog-fill{height:100%;border-radius:8px;transition:width .5s ease;}

/* QUESTION */
.qbox{border-radius:18px;padding:clamp(14px,2vh,22px) clamp(16px,2vw,28px);flex-shrink:0;border:2.5px dashed var(--ld);background:#FFFDE7;width:100%;}
.qlabel{font-size:clamp(.6rem,.76vw,.72rem);font-weight:800;color:var(--ld);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;}
.qzh{font-size:clamp(1.8rem,3.5vw,3rem);font-weight:900;color:var(--text);}
.qtip{font-size:clamp(.62rem,.76vw,.75rem);color:#ccc;margin-top:3px;}

/* SENTENCE AREA */
.sent-wrap{display:flex;align-items:center;gap:16px;flex-wrap:wrap;background:#F8F9FA;border-radius:13px;padding:clamp(20px,3vh,32px) clamp(18px,2.5vw,30px);flex-grow:1;min-height:clamp(100px,14vh,140px);}
.sent-wrap.two-lines{flex-direction:column;align-items:flex-start;gap:10px;}
.sent-line{display:flex;align-items:center;gap:8px;flex-wrap:wrap;width:100%;}
.line-label{font-size:clamp(.6rem,.72vw,.7rem);font-weight:800;color:#bbb;text-transform:uppercase;letter-spacing:.5px;min-width:30px;}
.slabel{font-size:clamp(.6rem,.76vw,.72rem);font-weight:800;color:#ccc;text-transform:uppercase;letter-spacing:1px;width:100%;margin-bottom:2px;}
.sword{font-size:clamp(1.4rem,2.5vw,1.8rem);font-weight:800;color:var(--text);margin:0 8px;}

/* SLOT */
.slot{min-width:clamp(120px,14vw,180px);height:auto;min-height:clamp(68px,9vh,90px);border-radius:14px;border:2.5px dashed #CCC;background:#FAFAFA;display:inline-flex;align-items:center;justify-content:center;font-size:clamp(1.2rem,2.2vw,1.8rem);font-weight:800;color:var(--text);transition:all .2s;cursor:default;padding:12px 18px;}
.slot.occupied{border:2.5px solid #5CBC8E;background:#D4F5E4;cursor:pointer;}
.slot.occupied:hover{background:#B8EED4;transform:scale(1.03);}
.slot.drag-over{border-color:#0097A7;background:#B2EBF2;transform:scale(1.08);box-shadow:0 0 0 3px rgba(0,151,167,.35);}
.slot.ok{border-color:#4CAF50!important;background:#C8F5CA!important;animation:bSlot .4s ease;}
.slot.bad{border-color:#F44336!important;background:#FFCDD2!important;animation:sSlot .4s ease;}
@keyframes bSlot{0%,100%{transform:scale(1)}50%{transform:scale(1.09)}}
@keyframes sSlot{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* CHIPS */
.chips-wrap{flex-grow:1;min-height:clamp(80px,10vh,120px);}
.clabel{font-size:clamp(.6rem,.76vw,.72rem);font-weight:800;color:#ccc;text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;}
.chips-row{display:flex;gap:9px;flex-wrap:wrap;align-items:flex-start;}
.chip{padding:clamp(12px,1.8vh,18px) clamp(18px,2.8vw,32px);border-radius:11px;font-size:clamp(1.4rem,2.5vw,2.6rem);font-weight:800;cursor:grab;user-select:none;transition:all .2s;touch-action:none;box-shadow:0 5px 16px rgba(0,0,0,.16), 0 2px 6px rgba(0,0,0,.1);border:2.5px solid transparent;position:relative;z-index:1;}
.chip:active{cursor:grabbing;transform:scale(1.07) rotate(2deg);z-index:500;}
.chip.dragging{opacity:.4;transform:scale(.93);}
.chip.used{opacity:.18;cursor:not-allowed;pointer-events:none;}
.cc0{background:#FFECB3;border-color:#FFD54F;color:#5D3A00;}
.cc1{background:#B3E5FC;border-color:#4FC3F7;color:#01579B;}
.cc2{background:#F8BBD9;border-color:#F48FB1;color:#880E4F;}
.cc3{background:#DCEDC8;border-color:#AED581;color:#33691E;}
.cc4{background:#E1BEE7;border-color:#CE93D8;color:#4A148C;}
.cc5{background:#FFCCBC;border-color:#FFAB91;color:#BF360C;}
.cc6{background:#B2EBF2;border-color:#80DEEA;color:#006064;}
/* drag ghost: 無 transition 避免拖曳延遲 */
.drag-ghost{position:fixed;pointer-events:none;z-index:9999;transform:scale(1.2) rotate(4deg);opacity:.9;transition:none;}

/* BUTTONS */
.btn-row{display:flex;gap:9px;justify-content:flex-end;align-items:center;flex-shrink:0;}
.btn{padding:clamp(8px,1vh,12px) clamp(16px,2vw,24px);border-radius:12px;border:none;font-family:'Nunito',sans-serif;font-size:clamp(.82rem,1.05vw,.98rem);font-weight:800;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px;}
.btn:hover{transform:translateY(-2px);}.btn:active{transform:scale(.97);}
.bclear{background:linear-gradient(135deg,#FFCDD2,#EF9A9A);color:#C62828;box-shadow:0 4px 12px rgba(239,154,154,.35);}
.bhint{background:linear-gradient(135deg,#FFF9C4,#FFD54F);color:#5D3A00;box-shadow:0 4px 12px rgba(255,213,79,.4);}
.bhint:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.bconf{background:linear-gradient(135deg,#A8E6CF,#5CBC8E);color:#fff;font-size:clamp(.85rem,1.05vw,1rem);padding:clamp(9px,1.1vh,13px) clamp(18px,2.2vw,28px);box-shadow:0 4px 12px rgba(92,188,142,.4);}
.bconf.l2{background:linear-gradient(135deg,#FFD6E0,#FF8FAB);box-shadow:0 4px 12px rgba(255,143,171,.4);}
.bconf.lmix{background:linear-gradient(135deg,#C5CAE9,#7986CB);box-shadow:0 4px 12px rgba(121,134,203,.4);}
.btn-cont.lmix{background:linear-gradient(135deg,#C5CAE9,#7986CB);box-shadow:0 6px 18px rgba(121,134,203,.45);}
.hint-count{background:#F44336;color:#fff;border-radius:50%;width:18px;height:18px;font-size:.62rem;display:inline-flex;align-items:center;justify-content:center;margin-left:2px;}

/* FEEDBACK */
.feedback{position:absolute;inset:0;border-radius:26px;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .3s;}
.feedback.show{opacity:1;pointer-events:all;}
.fb-ok{background:rgba(200,245,202,.96);}.fb-bad{background:rgba(255,205,210,.96);}
.fb-emoji{font-size:clamp(3rem,6vw,4.5rem);animation:popIn .4s ease;}
.fb-msg{font-size:clamp(1.3rem,2.4vw,2rem);font-weight:900;margin-top:8px;color:var(--text);animation:popIn .4s ease .08s both;}
.fb-sent{font-size:clamp(1.25rem,2.8vw,2rem);font-weight:800;color:var(--text);margin-top:12px;max-width:94%;text-align:center;animation:popIn .4s ease .16s both;background:#fff;padding:16px 28px;border-radius:14px;box-shadow:0 3px 12px rgba(0,0,0,.15);line-height:1.5;letter-spacing:.3px;}
@keyframes popIn{from{transform:scale(.35);opacity:0}to{transform:scale(1);opacity:1}}
.btn-next{margin-top:24px;padding:clamp(13px,1.5vh,18px) clamp(32px,4vw,50px);border-radius:16px;border:none;background:linear-gradient(135deg,#80DEEA,#26C6DA);color:#fff;font-family:'Nunito',sans-serif;font-size:clamp(1rem,1.8vw,1.25rem);font-weight:900;cursor:pointer;box-shadow:0 6px 18px rgba(38,198,218,.5);transition:all .2s;}
.btn-next:hover{transform:translateY(-3px) scale(1.04);}

/* SPEAK CONTAINER & BUTTON */
.speak-container{display:flex;flex-direction:column;align-items:center;margin-top:20px;animation:popIn .4s ease .2s both;}
.btn-speak{padding:15px 30px;border-radius:18px;border:none;background:linear-gradient(135deg,#FF7043,#FF5252);color:#fff;font-family:'Nunito',sans-serif;font-size:clamp(1rem,1.8vw,1.25rem);font-weight:700;cursor:pointer;box-shadow:0 6px 20px rgba(255,82,82,.5);transition:all .2s;display:flex;align-items:center;gap:10px;}
.btn-speak:hover{transform:translateY(-3px) scale(1.05);box-shadow:0 8px 25px rgba(255,82,82,.7);}
.btn-speak:active{transform:translateY(-1px) scale(1.02);}
.speak-hint{font-size:clamp(0.8rem,1.5vw,0.95rem);color:#FF5252;margin-top:8px;font-weight:600;}

/* ROUND COMPLETE */
.rcscreen{position:absolute;inset:0;border-radius:26px;background:rgba(255,253,231,.97);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:200;animation:popIn .5s ease;}
.rcscreen.show{display:flex;}
.rc-emoji{font-size:clamp(3.5rem,6vw,5rem);}
.rc-title{font-size:clamp(1.4rem,2.4vw,2.2rem);font-weight:900;color:var(--text);margin:10px 0 4px;}
.rc-sub{font-size:clamp(.82rem,1.05vw,1.05rem);color:#aaa;}
.rc-stars{display:flex;gap:10px;margin:12px 0;}
.rc-star{font-size:clamp(1.8rem,2.8vw,2.4rem);animation:starPop .4s ease both;}
.rc-star:nth-child(2){animation-delay:.15s;}.rc-star:nth-child(3){animation-delay:.3s;}
@keyframes starPop{from{transform:scale(0) rotate(-30deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
.btn-cont{margin-top:12px;padding:clamp(11px,1.3vh,16px) clamp(26px,3.2vw,40px);border-radius:16px;border:none;background:linear-gradient(135deg,#A8E6CF,#5CBC8E);color:#fff;font-family:'Nunito',sans-serif;font-size:clamp(.92rem,1.15vw,1.1rem);font-weight:900;cursor:pointer;box-shadow:0 6px 18px rgba(92,188,142,.45);transition:all .2s;}
.btn-cont:hover{transform:translateY(-3px) scale(1.03);}
.btn-cont.l2{background:linear-gradient(135deg,#FFD6E0,#FF8FAB);box-shadow:0 6px 18px rgba(255,143,171,.45);}

/* ── RESPONSIVE BREAKPOINTS ── */
@media(max-width:600px){
  .sent-wrap .sword{font-size:clamp(1.5rem,3.5vw,1.6rem);font-weight:900;}
  body{padding:8px 0 20px;}
  .card{min-height:auto;border-radius:14px;width:99vw;padding:12px 12px 14px;}
  .hdr{flex-direction:column;align-items:flex-start;}
  .tabs{width:100%;flex-wrap:wrap;}
  .tab{flex:1;text-align:center;}
  .qzh{font-size:clamp(1.2rem,5vw,1.8rem);}
  .chip{font-size:clamp(1rem,4.5vw,1.5rem);padding:8px 12px;}
  .slot{font-size:clamp(.9rem,3.5vw,1.1rem);min-width:clamp(65px,22vw,100px);}
  .sword{font-size:clamp(.9rem,3.5vw,1.1rem);}
  .fb-sent{font-size:clamp(1rem,3vw,1.5rem);padding:12px 20px;margin-top:10px;}
  .btn-next{font-size:clamp(.95rem,2.5vw,1.1rem);padding:12px 28px;margin-top:20px;}
}
@media(min-width:600px) and (max-width:900px){
  .card{min-height:auto;}
  .qzh{font-size:clamp(1.3rem,2.5vw,2rem);}
  .chip{font-size:clamp(1.1rem,2.2vw,1.6rem);}
  .slot{font-size:clamp(.95rem,1.8vw,1.2rem);}
}
@media(min-width:1024px){
  body{padding:16px 0 28px;}
  .card{padding:26px 34px;gap:18px;}
  .qbox{border-radius:20px;padding:20px 32px;}
  .hsub{display:none;}
  .tabs{flex-wrap:nowrap;gap:8px;}
  .tab{padding:7px 18px;font-size:.92rem;}
  .qzh{font-size:clamp(2.1rem,3.5vw,3.1rem);}
  .sent-wrap .sword{font-size:clamp(2.8rem,4.2vw,3rem);font-weight:900;margin:0 12px;}
  .sent-wrap{min-height:clamp(120px,16vh,160px);padding:26px 32px;gap:18px;}
  .chip{font-size:clamp(1.6rem,2.8vw,3rem);padding:16px 32px;box-shadow:0 7px 22px rgba(0,0,0,.2), 0 2px 8px rgba(0,0,0,.12);}
  .chips-wrap{min-height:clamp(110px,14vh,150px);}
  .chips-row{gap:16px;}
  .slot{font-size:clamp(1.4rem,2.8vw,2.4rem);min-width:clamp(140px,16vw,210px);min-height:clamp(72px,9.5vh,100px);padding:14px 24px;border-radius:16px;}
  .dbadge{font-size:.78rem;padding:4px 14px;}
  .fb-sent{font-size:clamp(1.5rem,3.5vw,2.2rem);padding:24px 36px;margin-top:16px;max-width:93%;}
  .btn-next{font-size:clamp(1.2rem,2vw,1.5rem);padding:18px 52px;margin-top:28px;font-weight:900;}
}
@media(orientation:portrait){
  body{padding:8px 0 20px;}
  .card{width:99vw;padding:12px 12px 14px;gap:8px;}
  .hdr{flex-direction:column;align-items:flex-start;}
  .tabs{width:100%;flex-wrap:wrap;}
  .tab{flex:1;text-align:center;min-width:80px;}
  .qzh{font-size:clamp(1.3rem,4.5vw,2rem);}
  .sent-wrap{gap:8px;padding:12px;}
  .chips-row{gap:8px;justify-content:center;}
  .chip{font-size:clamp(1rem,4vw,1.5rem);padding:8px 14px;}
  .slot{min-width:clamp(70px,20vw,110px);font-size:clamp(.9rem,3.5vw,1.1rem);}
  .fb-sent{font-size:clamp(1.1rem,3.5vw,1.6rem);padding:14px 24px;margin-top:10px;max-width:90%;}
  .btn-next{font-size:clamp(1rem,3vw,1.2rem);padding:12px 32px;margin-top:18px;}
}

/* ════════════════════════════════════════════════════════════════ */
/* BRICK REVEAL SYSTEM */
/* ════════════════════════════════════════════════════════════════ */
.chip-brick {
  background: linear-gradient(145deg, #b22222, #8b0000) !important;
  border-color: #5a0000 !important; color: transparent !important;
  text-shadow: none !important; cursor: pointer !important;
  box-shadow: 0 7px 0 #4a0000, 0 10px 18px rgba(0,0,0,.55) !important;
  background-image: none !important;
  position: relative; overflow: visible; user-select: none;
  width: 180px; height: 90px;
  display: flex; align-items: center; justify-content: center;
  box-sizing: border-box;
}
.chip-brick.crack-1 { animation: brickShakeBig .35s ease; }
@keyframes brickShakeBig {
  0%,100%{transform:translate(0,0) rotate(0)}
  15%{transform:translate(-5px,2px) rotate(-4deg)}
  30%{transform:translate(5px,-2px) rotate(3deg)}
  50%{transform:translate(-4px,1px) rotate(-3deg)}
  70%{transform:translate(3px,-1px) rotate(2deg)}
  85%{transform:translate(-2px,1px) rotate(-1deg)}
}
.chip-brick.crack-1::after {
  content:''; position:absolute; inset:0; border-radius:inherit; pointer-events:none;
  background:
    linear-gradient(52deg, transparent 38%, rgba(30,10,10,.8) 42%, rgba(30,10,10,.8) 44%, transparent 48%, transparent 64%, rgba(20,5,5,.65) 68%, rgba(20,5,5,.65) 69%, transparent 73%),
    linear-gradient(128deg, transparent 30%, rgba(20,5,5,.6) 34%, rgba(20,5,5,.6) 35%, transparent 39%);
}
@keyframes brickCrumble {
  0%  { transform:scale(1); opacity:1; }
  30% { transform:scale(1.15) rotate(2deg); }
  100%{ transform:scale(0) rotate(15deg); opacity:0; }
}
.chip-crumbling { animation:brickCrumble .4s ease forwards !important; pointer-events:none !important; }

/* ════════════════════════════════════════════════════════════════ */
/* CONFETTI */
/* ════════════════════════════════════════════════════════════════ */
.confetti-p {
  position:fixed; width:10px; height:10px; border-radius:2px;
  pointer-events:none; z-index:9999;
  animation:confettiFall linear forwards;
}
@keyframes confettiFall {
  0%   { transform:translateY(-20px) rotate(0deg); opacity:1; }
  80%  { opacity:1; }
  100% { transform:translateY(110vh) rotate(720deg); opacity:0; }
}
</style>
</head>
<body>
<div class="cloud c1"></div><div class="cloud c2"></div><div class="cloud c3"></div>
<div class="deco" style="top:9%;left:5%;animation-delay:0s">⭐</div>
<div class="deco" style="top:18%;right:5%;animation-delay:.7s">🌟</div>
<div class="deco" style="bottom:14%;left:4%;animation-delay:1.3s">✨</div>
<div class="deco" style="bottom:18%;right:4%;animation-delay:.4s">⭐</div>

<div class="card" id="mainCard">
  <!-- Header -->
  <div class="hdr">
    <div class="hdr-l">
      <div class="hicon">📝</div>
      <div><div class="htitle">Sentence Practice 句型重組練習</div><div class="hsub">長興國小五年級英語</div></div>
    </div>
    <div class="tabs">
      <button class="tab tl1" id="tab1" onclick="switchLesson(1)">🏃 Lesson 1<br><small style="font-size:.6rem;font-weight:600">現在進行式</small></button>
      <button class="tab" id="tab2" onclick="switchLesson(2)">🤒 Lesson 2<br><small style="font-size:.6rem;font-weight:600">感冒症狀</small></button>
      <button class="tab" id="tabMix" onclick="switchLesson('mix')">🔀 Mix<br><small style="font-size:.6rem;font-weight:600">綜合練習</small></button>
    </div>
  </div>

  <!-- Progress -->
  <div class="prog-wrap">
    <div class="prog-row">
      <span class="dbadge de active" id="bd-e">⭐ Easy</span>

// =====================================================================
// STATE
// =====================================================================
let les=1, diffIdx=0, roundNum=1;
const DIFFS=['easy','medium','hard'];
let usedIdx={1:{easy:[],medium:[],hard:[]},2:{easy:[],medium:[],hard:[]},'mix':{easy:[],medium:[],hard:[]}};
let curQ=null, slotVals=[], slotEls=[];
let dragIdx=-1, dragGhost=null, touchSlot=null;
let hintsLeft=3;
let correctCount=0;

function cDiff(){ return DIFFS[diffIdx]; }

function pickQ(l,d){
  const pool = (l==='mix') ? QB_MIX[d] : QB[l][d];
  const used=usedIdx[l][d];
  let av=pool.map((_,i)=>i).filter(i=>!used.includes(i));
  if(!av.length){ usedIdx[l][d]=[]; av=pool.map((_,i)=>i); }
  const i=av[~~(Math.random()*av.length)];
  usedIdx[l][d].push(i);
  return pool[i];
}

// =====================================================================
// SWITCH LESSON
// =====================================================================
function switchLesson(n){
  les=n; diffIdx=0; roundNum=1;
  document.getElementById('tab1').className='tab'+(n===1?' tl1':'');
  document.getElementById('tab2').className='tab'+(n===2?' tl2':'');
  document.getElementById('tabMix').className='tab'+(n==='mix'?' tlmix':'');
  const confCls = n===2?' l2': n==='mix'?' lmix':'';
  document.getElementById('btnConf').className='btn bconf'+confCls;
  document.getElementById('btnCont').className='btn-cont'+confCls;
  document.getElementById('rcScreen').className='rcscreen';
  document.getElementById('progFill').style.background=
    n===1 ?'linear-gradient(90deg,#A8E6CF,#5CBC8E)':
    n===2 ?'linear-gradient(90deg,#FFD6E0,#FF8FAB)':
           'linear-gradient(90deg,#C5CAE9,#7986CB)';
  correctCount=0;
  loadQ();
}

// =====================================================================
// LOAD QUESTION
// =====================================================================
function loadQ(){
  const d=cDiff();
  curQ=pickQ(les,d);
  slotVals=[]; slotEls=[]; dragIdx=-1;
  hintsLeft=3;

  // badges
  ['e','m','h'].forEach((k,i)=>{
    const el=document.getElementById('bd-'+k);
    el.className='dbadge d'+k;
    if(i<diffIdx) el.classList.add('done');
    if(i===diffIdx) el.classList.add('active');
  });
  document.getElementById('progFill').style.width=(diffIdx/3*100)+'%';
  document.getElementById('rbadge').textContent='Round '+roundNum;
  document.getElementById('qZh').textContent=curQ.zh;
  document.getElementById('qTip').textContent=
    d==='easy' ?'🖐 拖曳正確的單字填入空格':
    d==='medium'?'🖐 拖曳模塊填入空格（注意誘答選項！）':
                 '🖐 把所有模塊排成完整句子（可用提示）';

  // hint button: only for hard
  const btnHint=document.getElementById('btnHint');
  if(d==='hard'){
    btnHint.style.display='flex';
    btnHint.disabled=false;
    document.getElementById('hintCount').textContent=hintsLeft;
  } else {
    btnHint.style.display='none';
  }

  // build stem area
  if(d==='hard'){
    buildStemTwoLines();
  } else {
    buildStemSingle(curQ.stem);
  }

  // build chips (all difficulties use chips now)
  buildChips(curQ.chips);

  document.getElementById('fbOverlay').className='feedback';
  document.getElementById('btnNext').style.display='';
}

// =====================================================================
// BUILD STEM — single line (easy / medium)
// =====================================================================
function buildStemSingle(stemArr){
  const wrap=document.getElementById('sentWrap');
  wrap.className='sent-wrap';
  wrap.innerHTML='<div class="slabel">✏️ 排列答案</div>';
  let si=0;
  stemArr.forEach(p=>{
    if(p.t==='w'){
      const sp=document.createElement('span');sp.className='sword';sp.textContent=p.v;wrap.appendChild(sp);
    } else {
      const slot=makeSlot(si); wrap.appendChild(slot); si++;
    }
  });
}

// =====================================================================
// BUILD STEM — two lines (hard: question line + answer line)
// =====================================================================
function buildStemTwoLines(){
  const wrap=document.getElementById('sentWrap');
  wrap.className='sent-wrap two-lines';
  wrap.innerHTML='<div class="slabel">✏️ 排列答案（問句 + 答句分兩行）</div>';

  let si=0;
  // Question line
  const qRow=document.createElement('div'); qRow.className='sent-line';
  const qLbl=document.createElement('span'); qLbl.className='line-label'; qLbl.textContent='Q:'; qRow.appendChild(qLbl);
  curQ.qLine.forEach(p=>{ if(p.t==='w'){ const sp=document.createElement('span'); sp.className='sword'; sp.textContent=p.v; qRow.appendChild(sp); } else { const slot=makeSlot(si); qRow.appendChild(slot); si++; } });
  wrap.appendChild(qRow);

  // Answer line
  const aRow=document.createElement('div'); aRow.className='sent-line';
  const aLbl=document.createElement('span'); aLbl.className='line-label'; aLbl.textContent='A:'; aRow.appendChild(aLbl);
  curQ.aLine.forEach(p=>{ if(p.t==='w'){ const sp=document.createElement('span'); sp.className='sword'; sp.textContent=p.v; aRow.appendChild(sp); } else { const slot=makeSlot(si); aRow.appendChild(slot); si++; } });
  wrap.appendChild(aRow);
}

// =====================================================================
// MAKE SLOT helper
// =====================================================================
function makeSlot(si){
  const slot=document.createElement('div');
  slot.className='slot'; slot.dataset.si=si;
  slotVals.push(null); slotEls.push(slot);
  const mi=si;
  slot.addEventListener('dragover',e=>{e.preventDefault();slot.classList.add('drag-over');});
  slot.addEventListener('dragleave',()=>slot.classList.remove('drag-over'));
  slot.addEventListener('drop',e=>{e.preventDefault();slot.classList.remove('drag-over');dropOn(mi);});
  slot.addEventListener('click',()=>{ if(slot.classList.contains('occupied')&&!slot.classList.contains('hinted')) returnChip(mi); });
  return slot;
}

// =====================================================================
// BUILD CHIPS
// =====================================================================
function buildChips(chipsArr){
  const wrap=document.getElementById('chipsWrap'); wrap.style.display='';
  const row=document.getElementById('chipsRow'); row.innerHTML='';
  const shuffled=[...chipsArr].sort(()=>Math.random()-.5);
  shuffled.forEach((c,i)=>{
    const chip=document.createElement('div');
    chip.className='chip cc'+(i%7)+' chip-brick';
    chip.dataset.ci=i; chip.dataset.word=c.v; chip.dataset.hits='0';
    chip.draggable=false;
    chip.textContent='';
    chip.addEventListener('click',()=>hitBrick(chip,c.v,i));
    chip.addEventListener('dragstart',e=>{dragIdx=i;chip.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    chip.addEventListener('dragend',()=>chip.classList.remove('dragging'));
    chip.addEventListener('touchstart',e=>tStart(e,i),{passive:false});
    chip.addEventListener('touchmove',e=>tMove(e),{passive:false});
    chip.addEventListener('touchend',e=>tEnd(e,i));
    row.appendChild(chip);
  });
}

// =====================================================================
// BRICK HITTING
// =====================================================================
function hitBrick(chip,word,ci){
  if(!chip.classList.contains('chip-brick')) return;
  initAudio();
  const hits=parseInt(chip.dataset.hits||'0')+1;
  chip.dataset.hits=hits;
  if(hits===1){
    playKnockSound();
    chip.classList.remove('crack-1'); void chip.offsetWidth;
    chip.classList.add('crack-1');
  } else {
    playKnockSound();
    chip.classList.add('chip-crumbling');
    setTimeout(()=>{
      chip.classList.remove('chip-brick','crack-1','chip-crumbling');
      chip.style.animation='';
      chip.textContent=word;
      chip.draggable=true;
    },350);
  }
}

// =====================================================================
// DRAG / DROP
// =====================================================================
function dropOn(si){
  if(dragIdx<0) return;
  const chips=document.querySelectorAll('#chipsRow .chip');
  const chip=chips[dragIdx];
  if(!chip||chip.classList.contains('used')) return;
  if(slotVals[si]!==null) returnChip(si);
  const w=chip.dataset.word;
  slotVals[si]=w; chip.classList.add('used');
  slotEls[si].textContent=w; slotEls[si].className='slot occupied';
  dragIdx=-1;
  playThumpSound();
}

function returnChip(si){
  const w=slotVals[si]; if(!w) return;
  slotVals[si]=null; slotEls[si].textContent=''; slotEls[si].className='slot';
  const chips=document.querySelectorAll('#chipsRow .chip');
  for(const c of chips){ if(c.dataset.word===w&&c.classList.contains('used')){ c.classList.remove('used'); break; } }
}

// =====================================================================
// TOUCH
// =====================================================================
function tStart(e,ci){
  const ch=e.currentTarget;
  if(ch.classList.contains('chip-brick')){
    e.preventDefault();
    hitBrick(ch, ch.dataset.word, ci);
    return;
  }
  e.preventDefault(); dragIdx=ci;
  const t=e.touches[0];
  dragGhost=ch.cloneNode(true);
  dragGhost.className=ch.className+' drag-ghost';
  dragGhost.style.width=ch.offsetWidth+'px';
  dragGhost.style.left=(t.clientX-ch.offsetWidth/2)+'px';
  dragGhost.style.top=(t.clientY-ch.offsetHeight/2)+'px';
  document.body.appendChild(dragGhost);
}
function tMove(e){
  e.preventDefault(); if(!dragGhost) return;
  const t=e.touches[0];
  dragGhost.style.left=(t.clientX-dragGhost.offsetWidth/2)+'px';
  dragGhost.style.top=(t.clientY-dragGhost.offsetHeight/2)+'px';
  const el=document.elementFromPoint(t.clientX,t.clientY);
  document.querySelectorAll('.slot').forEach(s=>s.classList.remove('drag-over'));
  if(el&&el.classList.contains('slot')){ el.classList.add('drag-over'); touchSlot=parseInt(el.dataset.si); }
  else touchSlot=null;
}
function tEnd(e,ci){
  if(dragGhost){dragGhost.remove();dragGhost=null;}
  document.querySelectorAll('.slot').forEach(s=>s.classList.remove('drag-over'));
  if(touchSlot!==null){ dropOn(touchSlot); touchSlot=null; }
  dragIdx=-1;
}

// =====================================================================
// HINT (hard mode only) — reveal one empty slot
// =====================================================================
function useHint(){
  if(hintsLeft<=0) return;
  // get the flat correct answer list
  const answers=[...curQ.qLine,...curQ.aLine].map(p=>p.v);
  for(let i=0;i<slotVals.length;i++){
    if(slotVals[i]!==null) continue; // already filled
    const ans=answers[i];
    // fill slot as "hinted"
    slotVals[i]=ans;
    slotEls[i].textContent=ans;
    slotEls[i].className='slot occupied hinted';
    slotEls[i].style.borderColor='#CE93D8';
    slotEls[i].style.background='#F3E5F5';
    // mark chip used
    const chips=document.querySelectorAll('#chipsRow .chip');
    for(const c of chips){
      if(c.dataset.word===ans&&!c.classList.contains('used')){ c.classList.add('used'); break; }
    }
    hintsLeft--;
    document.getElementById('hintCount').textContent=hintsLeft;
    if(hintsLeft===0) document.getElementById('btnHint').disabled=true;
    break;
  }
}

// =====================================================================
// CLEAR
// =====================================================================
function clearAll(){
  for(let i=0;i<slotVals.length;i++){
    if(slotEls[i]&&slotEls[i].classList.contains('hinted')) continue; // keep hinted
    if(slotVals[i]) returnChip(i);
  }
}

// =====================================================================
// CHECK ANSWER
// =====================================================================
function checkAnswer(){
  const d=cDiff();
  let answers;
  if(d==='hard'){
    answers=[...curQ.qLine,...curQ.aLine].filter(p=>p.t==='s').map(p=>p.v);
  } else {
    answers=curQ.stem.filter(p=>p.t==='s').map(p=>p.v);
  }
  let ok=true;
  for(let i=0;i<answers.length;i++) if(slotVals[i]!==answers[i]){ok=false;break;}

  slotEls.forEach(s=>{
    if(s.classList.contains('hinted')) return;
    s.classList.remove('occupied');
    s.classList.add(ok?'ok':'bad');
  });

  const ov=document.getElementById('fbOverlay');
  ov.className='feedback show '+(ok?'fb-ok':'fb-bad');
  document.getElementById('fbEmoji').textContent=ok
    ?['🎉','🌟','🥳','✨','🎊'][~~(Math.random()*5)]
    :['😅','🤔','💪','🙈'][~~(Math.random()*4)];

  const okM=['Excellent! 太厲害了！','Great Job! 好棒喔！','Perfect! 完美！','Amazing! 真棒！'];
  const bdM=['Almost! 再試一次！','Keep Going! 重新排排看！','Try Again! 你可以的！'];
  document.getElementById('fbMsg').textContent=ok
    ?okM[~~(Math.random()*okM.length)]
    :bdM[~~(Math.random()*bdM.length)];

  let fullAns;
  if(d==='hard'){
    fullAns=curQ.qLine.map(p=>p.v).join(' ')+'  /  '+curQ.aLine.map(p=>p.v).join(' ');
  } else {
    fullAns=curQ.stem.map(p=>p.v).join(' ');
  }
  document.getElementById('fbSent').textContent=fullAns;

  // 答對：顯示 Next 按鈕與朗讀按鈕；答錯：2秒後關閉 overlay，重置同一題
  if(ok){
    playCorrectSound();
    document.getElementById('btnNext').style.display='';
    document.getElementById('speakContainer').style.display='flex';
  } else {
    playWrongSound();
    document.getElementById('btnNext').style.display='none';
    document.getElementById('speakContainer').style.display='none';
    setTimeout(()=>{
      ov.className='feedback';
      retryQ();
    }, 2000);
  }
}

// =====================================================================
// SPEAK SENTENCE — 手動朗讀句子
// =====================================================================
function speakSentence(){
  // 取得正確句子 (fbSent 的文本)
  const sentenceText=document.getElementById('fbSent').textContent;

  // 替換斜線為空格，避免系統唸出「slash」
  let textToSpeak=sentenceText.replace(/\s*\/\s*/g,' , ');

  // 先取消之前的朗讀，避免聲音重疊
  speechSynthesis.cancel();

  // 建立朗讀物件
  const utterance=new SpeechSynthesisUtterance(textToSpeak);
  utterance.lang='en-US';
  utterance.rate=0.6;  // 清晰慢速
  utterance.pitch=1;
  utterance.volume=1;

  // 開始朗讀
  speechSynthesis.speak(utterance);
}

// =====================================================================
// RETRY — 同一題重新填答（保留提示格，清除其他格）
// =====================================================================
function retryQ(){
  slotEls.forEach((s,i)=>{
    if(s.classList.contains('hinted')) return;
    s.classList.remove('ok','bad');
    if(slotVals[i]!==null) returnChip(i);
    s.className='slot';
  });
}

function nextQ(){

  document.getElementById('rcScreen').className='rcscreen show';

}
function nextRound(){
  roundNum++; diffIdx=0;
  document.getElementById('rcScreen').className='rcscreen';

  loadQ();
}

// =====================================================================
// SOUND EFFECTS (Web Audio API)
// 單一全域 AudioContext，避免重複建立耗盡資源
// =====================================================================
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function initAudio(){
  if(audioCtx.state === 'suspended') audioCtx.resume();
}

// 答對：短促上揚的 Do-Mi-Sol
function playCorrectSound(){
  try{
    initAudio();
    [[523.25,0],[659.25,0.1],[783.99,0.2]].forEach(([freq,delay])=>{
      const osc=audioCtx.createOscillator();
      const gain=audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type='sine'; osc.frequency.value=freq;
      const t=audioCtx.currentTime+delay;
      gain.gain.setValueAtTime(0,t);
      gain.gain.linearRampToValueAtTime(0.35,t+0.04);
      gain.gain.exponentialRampToValueAtTime(0.001,t+0.28);
      osc.start(t); osc.stop(t+0.3);
    });
  }catch(e){}
}

// 過關：輕快連續上升五聲音階 Do-Re-Mi-Sol-La-Do（約1.5秒）
function playVictorySound(){
  try{
    initAudio();
    // C4 D4 E4 G4 A4 C5 — 五聲音階向上
    const notes=[
      [261.63,0.00,0.28],
      [293.66,0.18,0.28],
      [329.63,0.34,0.28],
      [392.00,0.50,0.32],
      [440.00,0.68,0.32],
      [523.25,0.88,0.55],
    ];
    notes.forEach(([freq,delay,dur])=>{
      const osc=audioCtx.createOscillator();
      const gain=audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type='sine'; osc.frequency.value=freq;
      const t=audioCtx.currentTime+delay;
      gain.gain.setValueAtTime(0,t);
      gain.gain.linearRampToValueAtTime(0.4,t+0.05);
      gain.gain.exponentialRampToValueAtTime(0.001,t+dur);
      osc.start(t); osc.stop(t+dur+0.05);
    });
  }catch(e){}
}

// 碎裂聲：雜訊脈衝 + 下墜音調
function playCrackSound(){
  try{ initAudio(); const t=audioCtx.currentTime;
    const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.15,audioCtx.sampleRate);
    const data=buf.getChannelData(0); for(let i=0;i<data.length;i++) data[i]=(Math.random()*2-1);
    const src=audioCtx.createBufferSource(), gain=audioCtx.createGain();
    src.buffer=buf; src.connect(gain); gain.connect(audioCtx.destination);
    gain.gain.setValueAtTime(0.6,t); gain.gain.exponentialRampToValueAtTime(0.001,t+0.15);
    src.start(t); src.stop(t+0.15);
    const osc=audioCtx.createOscillator(), g2=audioCtx.createGain();
    osc.connect(g2); g2.connect(audioCtx.destination);
    osc.type='sawtooth'; osc.frequency.setValueAtTime(380,t);
    osc.frequency.exponentialRampToValueAtTime(60,t+0.2);
    g2.gain.setValueAtTime(0.3,t); g2.gain.exponentialRampToValueAtTime(0.001,t+0.22);
    osc.start(t); osc.stop(t+0.22);
  }catch(e){}
}

}

// 碎紙花特效
function launchConfetti(){
  const colors=['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#FF9F45','#C77DFF','#FF70A6'];
  for(let i=0;i<80;i++){
    const p=document.createElement('div'); p.className='confetti-p';
    p.style.left=Math.random()*100+'vw';
    p.style.background=colors[~~(Math.random()*colors.length)];
    p.style.width=(6+Math.random()*8)+'px'; p.style.height=(6+Math.random()*8)+'px';
    p.style.borderRadius=Math.random()>.5?'50%':'2px';
    const dur=(1.8+Math.random()*1.6).toFixed(2);
    p.style.animationDuration=dur+'s';
    p.style.animationDelay=(Math.random()*.6).toFixed(2)+'s';
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),(+dur+0.8)*1000);
  }
}
