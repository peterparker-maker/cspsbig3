<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>六年級 Phonics 發音聽力挑戰</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft JhengHei', 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            width: 100%;
            overflow-y: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 15px;
        }

        .game-container {
            background: white;
            border-radius: 25px;
            padding: 20px;
            width: 100%;
            height: auto;
            min-height: 90vh;
            max-width: 1400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
        }

        .top-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            gap: 20px;
        }

        .header {
            flex: 1;
        }

        .title {
            font-size: 1.8rem;
            color: #667eea;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #666;
        }

        .mode-selectors {
            display: flex;
            gap: 10px;
            flex-direction: column;
        }

        .difficulty-selector {
            display: flex;
            gap: 8px;
        }

        .difficulty-btn {
            padding: 8px 16px;
            background: white;
            border: 2px solid #667eea;
            border-radius: 10px;
            color: #667eea;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .difficulty-btn:hover {
            background: #f0f0ff;
        }

        .difficulty-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .unit-buttons {
            display: flex;
            gap: 8px;
        }

        .unit-button {
            padding: 8px 16px;
            background: white;
            border: 2px solid #667eea;
            border-radius: 10px;
            color: #667eea;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .unit-button:hover {
            background: #f0f0ff;
        }

        .unit-button.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .main-content {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 2.5fr;
            gap: 20px;
            min-height: 0;
        }

        .left-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .score-board {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 15px;
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            border-radius: 15px;
        }

        .score-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: white;
            border-radius: 10px;
        }

        .score-label {
            font-size: 1rem;
            color: #333;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 2px;
        }

        .score-label-en {
            font-size: 1rem;
            color: #333;
        }

        .score-label-ch {
            font-size: 0.75rem;
            color: #999;
        }

        .score-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #667eea;
        }

        .score-value.lives {
            color: #f5576c;
        }

        .progress-container {
            padding: 15px;
            background: linear-gradient(135deg, #11998e15 0%, #38ef7d15 100%);
            border-radius: 15px;
        }

        .progress-label {
            text-align: center;
            font-size: 1rem;
            font-weight: bold;
            color: #666;
            margin-bottom: 10px;
        }

        .progress-bar {
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .right-panel {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex: 1;
        }

        .question-area {
            text-align: center;
        }

        .instruction {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 15px;
        }

        .speaker-button {
            width: clamp(80px, 10vmin, 120px);
            height: clamp(80px, 10vmin, 120px);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
        }

        .speaker-button:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
        }

        .speaker-button:active {
            transform: scale(0.95);
        }

        .speaker-icon {
            font-size: 3.5rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .speaker-button.playing .speaker-icon {
            animation: speaking 0.5s infinite;
        }

        @keyframes speaking {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.2); }
            50% { transform: scale(0.9); }
            75% { transform: scale(1.15); }
        }

        .replay-hint {
            color: #999;
            font-size: 0.85rem;
            margin-bottom: 10px;
        }

        .speed-btn {
            padding: 6px 12px;
            background: #f5f5f5;
            border: 2px solid #ddd;
            border-radius: 8px;
            color: #666;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .speed-btn:hover {
            background: #e8f0ff;
            border-color: #667eea;
        }

        .speed-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .feedback {
            text-align: center;
            font-size: 1.8rem;
            font-weight: bold;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .feedback.correct {
            color: #11998e;
        }

        .feedback.wrong {
            color: #ff6b6b;
        }

        .options-area {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 15px;
            flex: 1;
            align-items: stretch;
        }

        .option-btn {
            flex: 1;
            min-height: 150px;
            padding: 20px 15px;
            background: white;
            border: 4px solid #667eea;
            border-radius: 18px;
            font-size: clamp(1.5rem, 8vmin, 4rem);
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #667eea;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            word-break: break-word;
            overflow-wrap: break-word;
            hyphens: auto;
            transform: none;
        }

        .option-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            background: #f0f0ff;
        }

        .option-btn:active {
            transform: translateY(-2px);
        }

        .option-btn.correct {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            border-color: #11998e;
            color: white;
            animation: correctShake 0.5s ease;
        }

        .option-btn.wrong {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a52 100%);
            border-color: #ff6b6b;
            color: white;
            animation: wrongShake 0.5s ease;
        }

        @keyframes correctShake {
            0%, 100% { transform: translateY(0); }
            25% { transform: translateY(-10px) scale(1.05); }
            75% { transform: translateY(-5px) scale(1.02); }
        }

        @keyframes wrongShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-5px); }
        }

        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .control-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .control-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.5);
        }

        .punishment-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .punishment-overlay.show {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .punishment-content {
            background: white;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            max-width: 600px;
            width: 80%;
            animation: bounceIn 0.5s ease;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }

        .punishment-emoji {
            font-size: 5rem;
            margin-bottom: 15px;
            animation: shake 0.5s infinite;
        }

        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-10deg); }
            75% { transform: rotate(10deg); }
        }

        .punishment-title {
            font-size: 1.8rem;
            color: #f5576c;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .punishment-text {
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 8px;
            line-height: 1.4;
            font-weight: bold;
        }

        .punishment-text-en {
            font-size: 1.1rem;
            color: #999;
            margin-bottom: 25px;
        }

        .success-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .success-overlay.show {
            display: flex;
        }

        .success-content {
            background: white;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            max-width: 500px;
            animation: popIn 0.5s ease;
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .success-icon {
            font-size: 5rem;
            margin-bottom: 15px;
        }

        .success-title {
            font-size: 2.2rem;
            color: #11998e;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .success-message {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 25px;
        }
    
        /* 平板直式模式調整 */
        @media (orientation: portrait) {
            .main-content {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr;
            }
            .left-panel { flex-direction: row; }
            .score-board { flex: 1; }
            .progress-container { flex: 1; }
        }

        /* 小螢幕調整 */
        @media (max-width: 800px) {
            .title { font-size: 1.5rem; }
            .option-btn { font-size: clamp(1.2rem, 6vmin, 2.5rem); min-height: 100px; }
            .speaker-button { width: clamp(70px, 9vmin, 100px); height: clamp(70px, 9vmin, 100px); }
            .speaker-icon { font-size: clamp(2rem, 5vmin, 3rem); }
        }

        /* ── RESPONSIVE ── */
        html { font-size: clamp(13px, 1.4vw, 16px); }

        @media (max-width: 600px) {
            body { padding: 8px; padding-bottom: 24px; }
            .game-container { padding: 12px; border-radius: 16px; min-height: auto; }
            .top-section { flex-direction: column; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
            .title { font-size: 1.2rem; }
            .subtitle { font-size: 0.75rem; }
            .main-content { grid-template-columns: 1fr; }
            .difficulty-btn, .unit-button { padding: 6px 10px; font-size: 0.75rem; }
            .option-btn { min-height: 80px; font-size: clamp(1.2rem, 7vw, 2rem); }
        }

        @media (min-width: 600px) and (max-width: 900px) {
            .game-container { padding: 14px; }
            .title { font-size: 1.4rem; }
            .main-content { gap: 12px; grid-template-columns: 1fr 2fr; }
            .option-btn { min-height: 120px; font-size: clamp(1.4rem, 6vmin, 2.8rem); }
        }

        @media (min-width: 1024px) {
            .game-container { padding: 20px; }
            .title { font-size: 1.8rem; }
            .main-content { grid-template-columns: 1fr 2.5fr; }
            .option-btn { min-height: 150px; font-size: clamp(1.5rem, 8vmin, 4rem); }
            .speaker-button { width: 120px; height: 120px; }
            .speaker-icon { font-size: 3.5rem; }
        }

    </style>
</head>
<body>
    <div class="game-container">
        <div class="top-section">
            <div class="header">
                <h1 class="title">🎧 Grade 6 Phonics Challenge 六年級發音挑戰</h1>
                <p class="subtitle">Listen and choose! Get 5 correct! 聽發音選答案，答對5題過關！</p>
            </div>

            <div class="mode-selectors">
                <div class="difficulty-selector">
                    <button class="difficulty-btn active" onclick="selectDifficulty('easy')">😊 Easy 簡單 (2)</button>
                    <button class="difficulty-btn" onclick="selectDifficulty('hard')">🔥 Hard 挑戰 (3)</button>
                </div>
                <div class="unit-buttons">
                    <button class="unit-button active" onclick="selectUnit('phonics12')">Phonics 1&2</button>
                    <button class="unit-button" onclick="selectUnit('phonics345')">Phonics 3,4&5</button>
                    <button class="unit-button" onclick="selectUnit('all')">All 全部</button>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="left-panel">
                <div class="score-board">
                    <div class="score-item">
                        <span class="score-label">
                            <span class="score-label-en">❤️ Lives</span>
                            <span class="score-label-ch">剩餘生命</span>
                        </span>
                        <span class="score-value lives" id="lives">2</span>
                    </div>
                    <div class="score-item">
                        <span class="score-label">
                            <span class="score-label-en">✅ Correct</span>
                            <span class="score-label-ch">正確</span>
                        </span>
                        <span class="score-value" id="correctScore">0</span>
                    </div>
                    <div class="score-item">
                        <span class="score-label">
                            <span class="score-label-en">❌ Wrong</span>
                            <span class="score-label-ch">錯誤</span>
                        </span>
                        <span class="score-value" id="wrongScore">0</span>
                    </div>
                </div>

                <div class="progress-container">
                    <div class="progress-label">Progress 過關進度：<span id="progressText">0 / 5</span></div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill" style="width: 0%">
                            <span id="progressPercent">0%</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="right-panel">
                <div class="question-area">
                    <div class="instruction">🎧 Click to listen 點擊聆聽</div>
                    <button class="speaker-button" id="speakerBtn" onclick="playSound()">
                        <div class="speaker-icon">🔊</div>
                    </button>
                    <div class="replay-hint">可以重複聆聽</div>
                    <div style="margin-top: 8px; display: flex; gap: 6px; justify-content: center; flex-wrap: wrap;">
                        <button class="speed-btn" data-rate="0.75" onclick="setPlaybackRate(0.75)">🐢 慢</button>
                        <button class="speed-btn active" data-rate="0.5" onclick="setPlaybackRate(0.5)">🐇 更慢</button>
                        <button class="speed-btn" data-rate="0.35" onclick="setPlaybackRate(0.35)">🚫 超慢</button>
                    </div>
                </div>

                <div class="feedback" id="feedback"></div>

                <div class="options-area" id="optionsArea">
                    <!-- Options will be generated here -->
                </div>

                <div class="controls">
                    <button class="control-btn" onclick="nextQuestion()">➡️ Next 下一題</button>
                    <button class="control-btn" onclick="restartGame()">🔄 Restart 重新開始</button>
                </div>
            </div>
        </div>
    </div>

    <div class="punishment-overlay" id="punishmentOverlay">
        <div class="punishment-content">
            <div class="punishment-emoji" id="punishmentEmoji">😱</div>
            <div class="punishment-title">Oops! Punishment Time! 哎呀！懲罰時間！</div>
            <div class="punishment-text" id="punishmentTextCh"></div>
            <div class="punishment-text-en" id="punishmentTextEn"></div>
            <button class="control-btn" onclick="closePunishment()">OK 我知道了 😅</button>
        </div>
    </div>

    <div class="success-overlay" id="successOverlay">
        <div class="success-content">
            <div class="success-icon">🎉</div>
            <div class="success-title">Congratulations! 恭喜過關！</div>
            <div class="success-message">You got 5 correct! 你答對了5題！</div>
            <button class="control-btn" onclick="restartGame()">Play Again 再玩一次</button>
        </div>
    </div>

    <script>
        let currentUnit = 'phonics12';
        let difficulty = 'easy';
        let currentWord = null;
        let correctAnswer = null;
        let correctCount = 0;
        let wrongCount = 0;
        let lives = 2;
        let answered = false;
        let currentPunishmentIndex = 0;
        let usedQuestions = [];
        let currentPlaybackRate = 0.5;  // 預設播放速率

        const punishments = [
            {
                emoji: '🐔',
                textEn: 'Cluck like a chicken three times! Cluck cluck cluck!',
                textCh: '學雞叫三聲！咕咕咕！'
            },
            {
                emoji: '🤸',
                textEn: 'Do three jumping jacks!',
                textCh: '做開合跳三下！'
            },
            {
                emoji: '🦘',
                textEn: 'Jump like a kangaroo three times! Hop! Hop! Hop!',
                textCh: '學袋鼠跳三下！跳！跳！跳！'
            },
            {
                emoji: '🐸',
                textEn: 'Croak like a frog: Ribbit ribbit ribbit!',
                textCh: '學青蛙叫：呱呱呱呱呱！'
            },
            {
                emoji: '🤪',
                textEn: 'Make a funny face for your classmates!',
                textCh: '做一個鬼臉給同學看！'
            }
        ];

        const phonicsData = {
            phonics12: [
                { word: 'black', options: ['blue', 'back'] },
                { word: 'blow', options: ['boat', 'bow'] },
                { word: 'clean', options: ['cloud', 'can'] },
                { word: 'click', options: ['clock', 'crack'] },
                { word: 'plane', options: ['play', 'pan'] },
                { word: 'plus', options: ['plug', 'pig'] },
                { word: 'glass', options: ['glow', 'gas'] },
                { word: 'glue', options: ['glass', 'go'] },
                { word: 'French fries', options: ['fresh juice', 'fried egg'] },
                { word: 'fruit', options: ['frog', 'fog'] },
                { word: 'dress', options: ['drink', 'desk'] },
                { word: 'driver', options: ['drum', 'diver'] },
                { word: 'grapes', options: ['grass', 'gate'] },
                { word: 'green', options: ['green', 'gas'] },
                { word: 'trash', options: ['tree', 'cash'] },
                { word: 'truck', options: ['train', 'duck'] },
                { word: 'blank', options: ['blue', 'bank'] },
                { word: 'blue', options: ['black', 'bee'] },
                { word: 'clear', options: ['clean', 'car'] },
                { word: 'pet', options: ['plane', 'pay'] },
                { word: 'lake', options: ['luck', 'lock'] },
                { word: 'tape', options: ['top', 'tall'] },
                { word: 'bike', options: ['big', 'back'] },
                { word: 'nine', options: ['name', 'neck'] },
                { word: 'fly', options: ['fry', 'bye'] },
                { word: 'play', options: ['pray', 'pay'] },
                { word: 'smile', options: ['small', 'mile'] },
                { word: 'snake', options: ['shake', 'cake'] }
            ],
            phonics345: [
                { word: 'skate', options: ['skip', 'sky'] },
                { word: 'star', options: ['stop', 'sun'] },
                { word: 'spoon', options: ['space', 'soon'] },
                { word: 'spider', options: ['speak', 'rider'] },
                { word: 'skirt', options: ['skin', 'shirt'] },
                { word: 'sticker', options: ['stamp', 'stick'] },
                { word: 'knee', options: ['know', 'key'] },
                { word: 'knife', options: ['knee', 'life'] },
                { word: 'wrench', options: ['write', 'ring'] },
                { word: 'wreath', options: ['wrong', 'reach'] },
                { word: 'comb', options: ['cold', 'come'] },
                { word: 'thumb', options: ['three', 'some'] },
                { word: 'long', options: ['lamp', 'log'] },
                { word: 'pink', options: ['pond', 'pig'] },
                { word: 'bank', options: ['book', 'back'] },
                { word: 'swing', options: ['swim', 'sing'] },
                { word: 'ring', options: ['red', 'sing'] },
                { word: 'sink', options: ['sun', 'sick'] },
                { word: 'sport', options: ['spell', 'sort'] },
                { word: 'state', options: ['stand', 'stay'] },
                { word: 'need', options: ['nose', 'net'] }
            ]
        };

        function selectDifficulty(level) {
            difficulty = level;
            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            restartGame();
        }

        function selectUnit(unit) {
            currentUnit = unit;
            document.querySelectorAll('.unit-button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            restartGame();
        }

        function getWordList() {
            if (currentUnit === 'all') {
                return [...phonicsData.phonics12, ...phonicsData.phonics345];
            }
            return phonicsData[currentUnit];
        }

        function generateQuestion() {
            answered = false;
            const wordList = getWordList();
            
            if (usedQuestions.length >= wordList.length) {
                usedQuestions = [];
            }
            
            let availableQuestions = wordList.filter((q, index) => 
                !usedQuestions.includes(index)
            );
            
            const randomIndex = Math.floor(Math.random() * availableQuestions.length);
            const questionData = availableQuestions[randomIndex];
            
            const originalIndex = wordList.indexOf(questionData);
            usedQuestions.push(originalIndex);
            
            currentWord = questionData.word;
            correctAnswer = questionData.word;

            let options;
            if (difficulty === 'easy') {
                const wrongAnswer = questionData.options[Math.floor(Math.random() * questionData.options.length)];
                options = [correctAnswer, wrongAnswer];
            } else {
                options = [correctAnswer, ...questionData.options];
            }

            options = options.sort(() => Math.random() - 0.5);

            // 先清空，讓瀏覽器完整渲染後再建立新按鈕，避免動畫殘留
            document.getElementById('optionsArea').innerHTML = '';
            requestAnimationFrame(() => {
                displayOptions(options);
            });

            document.getElementById('feedback').textContent = '';
            document.getElementById('feedback').className = 'feedback';
            
            setTimeout(() => playSound(), 500);
        }

        function displayOptions(options) {
            const optionsArea = document.getElementById('optionsArea');
            optionsArea.innerHTML = '';

            options.forEach(option => {
                const btn = document.createElement('button');
                // 明確重置：只套用基礎 class，清除任何殘留狀態
                btn.className = 'option-btn';
                btn.classList.remove('correct', 'wrong');
                btn.style.transform = 'none';
                btn.textContent = option;
                btn.onclick = () => checkAnswer(option, btn);
                optionsArea.appendChild(btn);
            });
        }

        function playSound() {
            if (!currentWord) return;

            const speakerBtn = document.getElementById('speakerBtn');
            speakerBtn.classList.add('playing');

            const utterance = new SpeechSynthesisUtterance(currentWord);
            utterance.lang = 'en-US';
            utterance.rate = currentPlaybackRate;  // 使用用戶選擇的播放速率
            utterance.pitch = 1;
            utterance.volume = 1;      // 最大音量（0-1）

            // 選擇清晰的女性英文語音
            const voices = speechSynthesis.getVoices();
            const englishVoice = voices.find(v => v.lang.includes('en') && v.name.includes('Female'))
                              || voices.find(v => v.lang.includes('en'))
                              || voices[0];
            if (englishVoice) utterance.voice = englishVoice;

            utterance.onend = () => {
                speakerBtn.classList.remove('playing');
            };

            speechSynthesis.cancel();
            speechSynthesis.speak(utterance);
        }

        function setPlaybackRate(rate) {
            currentPlaybackRate = rate;
            document.querySelectorAll('.speed-btn').forEach(btn => {
                if (parseFloat(btn.dataset.rate) === rate) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        function checkAnswer(selectedWord, button) {
            if (answered) return;
            answered = true;

            const allButtons = document.querySelectorAll('.option-btn');
            allButtons.forEach(btn => {
                btn.style.pointerEvents = 'none';
            });

            if (selectedWord === correctAnswer) {
                button.classList.add('correct');
                document.getElementById('feedback').textContent = '✅ Correct! 正確！';
                document.getElementById('feedback').className = 'feedback correct';
                correctCount++;
                document.getElementById('correctScore').textContent = correctCount;
                
                updateProgress();
                playSuccessSound();

                if (correctCount >= 5) {
                    setTimeout(() => showSuccess(), 1500);
                } else {
                    setTimeout(() => nextQuestion(), 1500);
                }
            } else {
                button.classList.add('wrong');
                document.getElementById('feedback').textContent = '❌ Wrong! 錯誤！';
                document.getElementById('feedback').className = 'feedback wrong';
                wrongCount++;
                lives--;
                document.getElementById('wrongScore').textContent = wrongCount;
                document.getElementById('lives').textContent = lives;
                
                playErrorSound();

                if (lives < 0) {
                    setTimeout(() => showPunishment(), 1500);
                } else {
                    setTimeout(() => nextQuestion(), 1500);
                }
            }
        }

        function updateProgress() {
            const percentage = (correctCount / 5) * 100;
            document.getElementById('progressFill').style.width = percentage + '%';
            document.getElementById('progressPercent').textContent = Math.round(percentage) + '%';
            document.getElementById('progressText').textContent = correctCount + ' / 5';
        }

        function showPunishment() {
            const punishment = punishments[currentPunishmentIndex];
            document.getElementById('punishmentEmoji').textContent = punishment.emoji;
            document.getElementById('punishmentTextCh').textContent = punishment.textEn;
            document.getElementById('punishmentTextEn').textContent = punishment.textCh;
            document.getElementById('punishmentOverlay').classList.add('show');
            
            currentPunishmentIndex = (currentPunishmentIndex + 1) % punishments.length;

            if (navigator.vibrate) {
                navigator.vibrate([200, 100, 200, 100, 200]);
            }
        }

        function closePunishment() {
            document.getElementById('punishmentOverlay').classList.remove('show');
            lives = 2;
            document.getElementById('lives').textContent = lives;
            nextQuestion();
        }

        function showSuccess() {
            document.getElementById('successOverlay').classList.add('show');
            playVictorySound();
        }

        function playSuccessSound() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = 523.25;
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.5);
        }

        function playErrorSound() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = 200;
            oscillator.type = 'sawtooth';
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.3);

            if (navigator.vibrate) {
                navigator.vibrate(200);
            }
        }

        function playVictorySound() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            
            const notes = [523.25, 587.33, 659.25, 783.99];
            notes.forEach((freq, index) => {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.value = freq;
                oscillator.type = 'sine';
                
                const startTime = audioContext.currentTime + (index * 0.15);
                gainNode.gain.setValueAtTime(0.3, startTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, startTime + 0.3);
                
                oscillator.start(startTime);
                oscillator.stop(startTime + 0.3);
            });
        }

        function nextQuestion() {
            if (correctCount >= 5) {
                showSuccess();
                return;
            }
            generateQuestion();
        }

        function restartGame() {
            correctCount = 0;
            wrongCount = 0;
            lives = 2;
            usedQuestions = [];
            document.getElementById('correctScore').textContent = '0';
            document.getElementById('wrongScore').textContent = '0';
            document.getElementById('lives').textContent = '2';
            document.getElementById('successOverlay').classList.remove('show');
            updateProgress();
            generateQuestion();
        }

        generateQuestion();
    </script>
</body>
</html>
